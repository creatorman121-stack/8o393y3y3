<script id="ojV117FutureDeckScript">
(function(){
  'use strict';
  if(window.__OJ_V117_PERSONAL_FUTURE_DECK__) return;
  window.__OJ_V117_PERSONAL_FUTURE_DECK__ = true;

  var VIEW_ID = 'view-command_deck';
  var ACTIVE_TAB = localStorage.getItem('oj_v117_tab') || 'hud';
  var PROFILE_KEY = 'oj_v117_personal_profile';
  var DEFAULT_PROFILE = {name:'Jetters', mode:'Staff / Passenger', focusRoute:'cebu_tagbilaran', seat:'Auto', points:0};

  function el(id){ return document.getElementById(id); }
  function db(){ try{ return (typeof DB !== 'undefined' && DB) ? DB : null; }catch(e){ return null; } }
  function toast(msg){ if(typeof window.toast === 'function') window.toast(msg); else console.log(msg); }
  function money(n){ try{ return '₱' + Number(n || 0).toLocaleString('en-PH'); }catch(e){ return '₱' + n; } }
  function readProfile(){
    try{ return Object.assign({}, DEFAULT_PROFILE, JSON.parse(localStorage.getItem(PROFILE_KEY) || '{}')); }
    catch(e){ return Object.assign({}, DEFAULT_PROFILE); }
  }
  function saveProfile(p){ localStorage.setItem(PROFILE_KEY, JSON.stringify(Object.assign({}, readProfile(), p || {}))); }
  function routeTitle(key){
    var D = db();
    return D && D.schedules && D.schedules[key] && D.schedules[key].title ? D.schedules[key].title : String(key || '').replace(/_/g,' → ');
  }
  function parseMinutes(raw){
    if(!raw) return 99999;
    var s = String(raw).trim().toUpperCase().replace(/\s+/g,'');
    var m = s.match(/^(\d{1,2}):(\d{2})(AM|PM)$/);
    if(!m) return 99999;
    var h = parseInt(m[1],10), min = parseInt(m[2],10), ap = m[3];
    if(ap === 'PM' && h !== 12) h += 12;
    if(ap === 'AM' && h === 12) h = 0;
    return h * 60 + min;
  }
  function nowMinutes(){
    var d = new Date();
    try{
      var parts = new Intl.DateTimeFormat('en-PH',{timeZone:'Asia/Manila',hour:'2-digit',minute:'2-digit',hour12:false}).formatToParts(d);
      var hh = +(parts.find(function(p){return p.type==='hour';}) || {value:d.getHours()}).value;
      var mm = +(parts.find(function(p){return p.type==='minute';}) || {value:d.getMinutes()}).value;
      return hh * 60 + mm;
    }catch(e){ return d.getHours() * 60 + d.getMinutes(); }
  }
  function cebuRoutes(){
    var D = db();
    if(!D || !D.schedules) return [];
    return Object.keys(D.schedules).filter(function(k){ return k.indexOf('cebu_') === 0 || k.indexOf('_cebu') > -1; }).sort();
  }
  function allTrips(){
    var D = db(), out = [];
    if(!D || !D.schedules) return out;
    cebuRoutes().forEach(function(key){
      var s = D.schedules[key] || {};
      (s.trips || []).forEach(function(t,i){
        var mins = parseMinutes(t.dep);
        var eta = mins - nowMinutes();
        if(eta < 0) eta += 1440;
        out.push({key:key,title:s.title || routeTitle(key),travel:s.travel || '',dep:t.dep || '',arr:t.arr || '',vessel:t.vessel || 'TBA',remarks:t.remarks || '',mins:mins,etaMin:eta,idx:i});
      });
    });
    return out.sort(function(a,b){ return a.etaMin - b.etaMin; });
  }
  function fare(key){
    var D = db();
    var f = D && D.paxFares && D.paxFares[key] ? D.paxFares[key] : null;
    if(!f) return 'Fare unavailable';
    return 'Tourist ' + money(f['TC/OA']) + ' • Business ' + money(f.BC);
  }
  function getArRecords(){
    var results = [];
    try{
      for(var i=0;i<localStorage.length;i++){
        var k = localStorage.key(i);
        if(!k || !/(ar|damage|claim|scan)/i.test(k)) continue;
        var val = localStorage.getItem(k);
        if(!val || val.length > 3500000) continue;
        var parsed = JSON.parse(val);
        if(Array.isArray(parsed)) results = results.concat(parsed);
        else if(parsed && typeof parsed === 'object' && Array.isArray(parsed.records)) results = results.concat(parsed.records);
      }
    }catch(e){}
    return results.slice(-12).reverse();
  }
  function scoreProfile(){
    var D = db() || {};
    var p = readProfile();
    var scans = getArRecords().length;
    var tx = D.stats && D.stats.transactions ? D.stats.transactions : 0;
    return (p.points || 0) + scans * 8 + tx * 3;
  }
  function ensureView(){
    var view = el(VIEW_ID);
    if(!view){
      view = document.createElement('div');
      view.id = VIEW_ID;
      view.className = 'view';
      (document.querySelector('.app') || document.body).appendChild(view);
    }
    return view;
  }
  function patchDrawer(){
    var menu = el('drawerMenu');
    if(menu){
      var item = menu.querySelector('[data-view="command_deck"]');
      if(!item){
        item = document.createElement('div');
        item.className = 'drawer-item';
        item.setAttribute('data-view','command_deck');
        item.onclick = function(){ if(typeof window.navigate === 'function') window.navigate('command_deck'); else show(); };
        var before = menu.querySelector('[data-view="map"]');
        if(before) menu.insertBefore(item,before); else menu.appendChild(item);
      }
      item.innerHTML = '<i>🛸</i> Future Deck';
    }
    if(typeof window.buildDrawerMenu === 'function' && !window.buildDrawerMenu.__v117FutureDeck){
      var originalBuild = window.buildDrawerMenu;
      window.buildDrawerMenu = function(){
        var result = originalBuild.apply(this, arguments);
        setTimeout(patchDrawer,0);
        return result;
      };
      window.buildDrawerMenu.__v117FutureDeck = true;
    }
  }
  function patchShowView(){
    if(typeof window.showView === 'function' && !window.showView.__v117FutureDeck){
      var originalShow = window.showView;
      window.showView = function(name){
        ensureView();
        var result = originalShow.apply(this, arguments);
        if(name === 'command_deck') render();
        patchDrawer();
        return result;
      };
      window.showView.__v117FutureDeck = true;
    }
  }
  function tab(id,label){ return '<button class="oj117-tab ' + (ACTIVE_TAB === id ? 'active' : '') + '" onclick="window.OJFutureDeck.open(\'' + id + '\')">' + label + '</button>'; }
  function panel(id, body){ return '<div class="oj117-panel ' + (ACTIVE_TAB === id ? 'active' : '') + '">' + body + '</div>'; }
  function hero(){
    var trips = allTrips();
    var next = trips[0];
    var p = readProfile();
    var scans = getArRecords().length;
    var D = db() || {};
    return '<div class="oj117-hero">' +
      '<div class="oj117-kicker">OceanJet Personal Future System</div>' +
      '<div class="oj117-title">Future Deck</div>' +
      '<div class="oj117-sub">A single immersive tab for staff and passengers: digital pass, journey cockpit, baggage twin, terminal simulator, comfort tools, rewards, and AI quick actions.</div>' +
      '<div class="oj117-status-grid">' +
        '<div class="oj117-status"><b>' + (p.name || 'Jetters') + '</b><span>Profile</span></div>' +
        '<div class="oj117-status"><b>' + (next ? next.vessel : '--') + '</b><span>Next Vessel</span></div>' +
        '<div class="oj117-status"><b>' + (next ? next.etaMin + 'm' : '--') + '</b><span>Board ETA</span></div>' +
        '<div class="oj117-status"><b>' + scoreProfile() + '</b><span>Future Score</span></div>' +
        '<div class="oj117-status"><b>' + (trips.length || 0) + '</b><span>Cebu Trips</span></div>' +
        '<div class="oj117-status"><b>' + (scans || 0) + '</b><span>Claim Records</span></div>' +
        '<div class="oj117-status"><b>' + (D.stats && D.stats.transactions ? D.stats.transactions : 0) + '</b><span>Transactions</span></div>' +
        '<div class="oj117-status"><b>Stable</b><span>Light UI</span></div>' +
      '</div>' +
    '</div>';
  }
  function tabs(){
    return '<div class="oj117-tabs">' + tab('hud','HUD') + tab('journey','Journey') + tab('baggage','Baggage') + tab('terminal','Terminal') + tab('comfort','Comfort') + tab('rewards','Rewards') + tab('copilot','Copilot') + '</div>';
  }
  function renderHud(){
    var p = readProfile();
    var routes = cebuRoutes();
    var focus = p.focusRoute || routes[0] || 'cebu_tagbilaran';
    var next = allTrips().filter(function(t){return t.key === focus;})[0] || allTrips()[0];
    return panel('hud','<div class="oj117-grid">' +
      '<div class="oj117-card"><h4>🧬 Digital Twin Pass</h4><div style="display:flex;gap:12px;align-items:center"><div class="oj117-avatar">' + (p.mode && p.mode.toLowerCase().indexOf('staff')>=0 ? '🧑‍✈️' : '🧳') + '</div><div style="flex:1"><div class="oj117-mini">Identity</div><input id="oj117Name" value="' + esc(p.name) + '" placeholder="Name / Staff ID"><div class="oj117-mini" style="margin-top:7px">Mode</div><select id="oj117Mode"><option>Staff / Passenger</option><option>Passenger Experience</option><option>Baggage Staff</option><option>Cashier Desk</option><option>Supervisor Bridge</option></select></div></div><div class="oj117-actions"><button class="primary sm" onclick="window.OJFutureDeck.saveProfile()">Save Profile</button><button class="accent sm" onclick="window.OJFutureDeck.addPoints(10)">Add Demo Points</button></div></div>' +
      '<div class="oj117-card"><h4>🎫 Holographic Boarding Preview</h4><div class="oj117-pass"><div class="oj117-pass-row"><span>Route</span><b>' + esc(routeTitle(focus)) + '</b></div><div class="oj117-pass-row"><span>Vessel</span><b>' + esc(next ? next.vessel : 'TBA') + '</b></div><div class="oj117-pass-row"><span>Departure</span><b>' + esc(next ? (next.dep + ' → ' + next.arr) : '--') + '</b></div><div class="oj117-pass-row"><span>Seat / Lane</span><b>' + esc(p.seat || 'Auto') + '</b></div><div class="oj117-pass-row"><span>Fare</span><b>' + esc(fare(focus)) + '</b></div></div><div class="oj117-actions"><button class="primary sm" onclick="window.OJFutureDeck.open(\'journey\')">Open Journey</button><button class="sm" onclick="window.OJFutureDeck.printPass()">Print Pass View</button></div></div>' +
      '<div class="oj117-card"><h4>🧭 Focus Route</h4><select id="oj117FocusRoute" onchange="window.OJFutureDeck.setFocusRoute(this.value)">' + routes.map(function(r){return '<option value="' + r + '" ' + (r===focus?'selected':'') + '>' + esc(routeTitle(r)) + '</option>';}).join('') + '</select><p style="margin-top:8px">This controls the personal HUD, journey simulator, baggage twin and copilot prompts.</p></div>' +
      '<div class="oj117-card"><h4>⚡ Quick Launch</h4><div class="oj117-actions"><button class="sm" onclick="window.OJFutureDeck.go(\'calculator\')">Baggage Calc</button><button class="sm" onclick="toast(\'Damage scanner removed in this clean build\')">Disabled</button><button class="sm" onclick="window.OJFutureDeck.go(\'map\')">Map Pro</button><button class="sm" onclick="window.OJFutureDeck.go(\'schedules\')">Schedules</button></div><p style="margin-top:8px">One-tab futuristic control, with safe jumps to the existing tools when needed.</p></div>' +
    '</div>');
  }
  function renderJourney(){
    var p = readProfile();

    if(!list.length) list = allTrips().slice(0,5);
    return panel('journey','<div class="oj117-card"><h4>🌊 Journey Cockpit</h4><p>Choose a route and experience a pilot-style view for the next trip without using heavy graphics.</p>' +
      list.map(function(t,i){
        var progress = Math.max(6, Math.min(96, 100 - Math.min(t.etaMin,100)));
        return '<div class="oj117-route"><div><b>' + esc(t.title) + '</b><br><small>' + esc(t.vessel) + ' • ' + esc(t.dep) + ' → ' + esc(t.arr) + ' • ' + esc(fare(t.key)) + '</small><div class="oj117-meter"><i style="width:' + progress + '%"></i></div></div><span class="oj117-pill">' + (i===0 ? 'Priority' : t.etaMin + 'm') + '</span></div>';
      }).join('') +
      '<div class="oj117-actions"><button class="primary sm" onclick="window.OJFutureDeck.go(\'map\')">Open Map Pro</button><button class="accent sm" onclick="window.OJFutureDeck.askAI(\'Give me a passenger-friendly journey briefing for my selected OceanJet route.\')">Ask AI Briefing</button></div></div>' +
      '<div class="oj117-grid"><div class="oj117-card"><h4>🪟 Window View Simulation</h4><p>Sea mode, boarding status, arrival estimate, and passenger flow are summarized from schedule data.</p><div class="oj117-meter"><i style="width:72%"></i></div><div class="oj117-mini">Sea confidence: good visibility</div></div><div class="oj117-card"><h4>🛫 Plane-like Feeling</h4><p>Use this panel like a cockpit: route, ETA, vessel, fare, and next actions are in one screen.</p><span class="oj117-pill">Immersive but light</span></div></div>');
  }
  function renderBaggage(){
    var records = getArRecords();

      toast('Baggage digital twin exported');
    }
  };

  window.OJCommandDeck = window.OJFutureDeck;

  function boot(){ ensureView(); patchDrawer(); patchShowView(); }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot, {once:true}); else boot();
})();

<script id="oj118Script">

  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
  function money(n){n=Number(n||0);return '₱'+n.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',')}
  function profile(){try{return Object.assign({name:'Jetters',mode:'Staff / Passenger',focusRoute:'cebu_tagbilaran',points:0},JSON.parse(localStorage.getItem(PROFILE_KEY)||'{}'))}catch(e){return {name:'Jetters',mode:'Staff / Passenger',focusRoute:'cebu_tagbilaran',points:0}}}

  function parseTime(t){var m=String(t||'').match(/(\d{1,2}):(\d{2})\s*([AP]M)?/i);if(!m)return 9999;var h=+m[1],min=+m[2],ap=(m[3]||'').toUpperCase();if(ap==='PM'&&h<12)h+=12;if(ap==='AM'&&h===12)h=0;return h*60+min}
  function nowMin(){var d=new Date();return d.getHours()*60+d.getMinutes()}
  function trips(){var s=(data().schedules||{}),out=[],now=nowMin();cebuRoutes().forEach(function(k){(s[k].trips||[]).forEach(function(t,i){var m=parseTime(t.dep),eta=m-now;if(eta<0)eta+=1440;out.push({key:k,title:routeTitle(k),dep:t.dep||'',arr:t.arr||'',vessel:t.vessel||'TBA',idx:i,eta:eta,status:eta<30?'Boarding':eta<90?'Soon':eta<240?'Scheduled':'Standby'})})});return out.sort(function(a,b){return a.eta-b.eta})}

  function tab(id,label){return '<button class="oj118-tab '+(ACTIVE===id?'active':'')+'" onclick="window.OJFutureDeckV118.open(\''+id+'\')">'+label+'</button>'}

  window.OJFutureDeck=Object.assign(window.OJFutureDeck||{},{show:show,refresh:render,open:function(id){window.OJFutureDeckV118.open(id)}});
  function boot(){ensureView();patchDrawer();patchShow()}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot,{once:true});else boot();

<script id="oj120Script">
(function(){
  'use strict';
  var VERSION='V120 Smart Operations Pro';
  var VIEW_ID='view-smart_ops';
  var ACTIVE=localStorage.getItem('oj_v120_tab')||'mission';
  function el(id){return document.getElementById(id)}
  function D(){try{return (typeof DB!=='undefined'&&DB)?DB:(window.DB||{})}catch(e){return window.DB||{}}}
  function toast(m){if(typeof window.toast==='function')window.toast(m);else console.log(m)}
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
  function money(n){if(typeof fmtPHP==='function')return fmtPHP(Number(n||0));return '₱'+Number(n||0).toFixed(2)}
  function routeTitle(k){var d=D();return (d.schedules&&d.schedules[k]&&d.schedules[k].title)||String(k||'').replace(/_/g,' → ')}
  function cebuRoutes(){var s=D().schedules||{};return Object.keys(s).filter(function(k){return /^cebu_/.test(k)}).sort(function(a,b){return routeTitle(a).localeCompare(routeTitle(b))})}
  function parseTime(t){var m=String(t||'').match(/(\d{1,2}):(\d{2})\s*([AP]M)?/i);if(!m)return 9999;var h=+m[1],min=+m[2],ap=(m[3]||'').toUpperCase();if(ap==='PM'&&h<12)h+=12;if(ap==='AM'&&h===12)h=0;return h*60+min}

  function arRecords(){var a=[];try{['oj_v110_ar_inspection_records','oj_v109_ar_baggage_claim_records'].forEach(function(k){var raw=localStorage.getItem(k);if(raw){var p=JSON.parse(raw);if(Array.isArray(p))a=a.concat(p);else if(p&&Array.isArray(p.records))a=a.concat(p.records)}});for(var i=0;i<localStorage.length;i++){var key=localStorage.key(i)||'';if(!/(ar|damage|claim|scan)/i.test(key)||/v110|v109/.test(key))continue;var v=localStorage.getItem(key);if(!v||v.length>2500000)continue;var p=JSON.parse(v);if(Array.isArray(p))a=a.concat(p);else if(p&&Array.isArray(p.records))a=a.concat(p.records)}}catch(e){}return a.reverse().slice(0,50)}

  function patchDrawer(){var menu=el('drawerMenu');if(!menu)return;var item=menu.querySelector('[data-view="smart_ops"]');if(!item){item=document.createElement('div');item.className='drawer-item';item.setAttribute('data-view','smart_ops');item.onclick=function(){if(typeof window.navigate==='function')window.navigate('smart_ops');else show()};var before=menu.querySelector('[data-view="command_deck"]')||menu.querySelector('[data-view="calculator"]');if(before)menu.insertBefore(item,before);else menu.appendChild(item)}item.innerHTML='<i>🧠</i> Smart Ops'}

  function setActiveDrawer(){document.querySelectorAll('.drawer-item').forEach(function(x){x.classList.remove('active')});var item=document.querySelector('.drawer-item[data-view="smart_ops"]');if(item)item.classList.add('active')}
  function show(){ensureView();document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active')});el(VIEW_ID).classList.add('active');setActiveDrawer();render()}

  function hero(){var t=trips()[0],records=arRecords().length,stats=D().stats||{};return '<div class="oj120-hero"><div class="oj120-kicker">'+VERSION+' • lightweight</div><div class="oj120-title">Smart Operations Pro</div><div class="oj120-sub">A practical operations cockpit for baggage, claims, next vessel, Gemini, and app health. No heavy animation layer.</div><div class="oj120-statgrid"><div class="oj120-stat"><b>'+esc(t?t.vessel:'TBA')+'</b><span>Next Vessel</span></div><div class="oj120-stat"><b>'+(t?t.eta+'m':'--')+'</b><span>ETA</span></div><div class="oj120-stat"><b>'+records+'</b><span>Claim Records</span></div><div class="oj120-stat"><b>'+(stats.transactions||0)+'</b><span>Transactions</span></div></div></div>'}

<script id="oj121Script">
(function(){
  'use strict';

  var ACTIVE=localStorage.getItem('oj_v121_tab')||'overview';

  function isWeekend(){var d=new Date().getDay();return d===0||d===6}
  function riskClass(score){return score>=75?'bad':score>=50?'warn':'good'}
