const CEBU_ROUTE_LABELS = {
  cebu_tagbilaran:'Tagbilaran', cebu_ormoc:'Ormoc', cebu_getafe:'Getafe', cebu_palompon:'Palompon',
  cebu_maasin:'Maasin', cebu_dumaguete:'Dumaguete', cebu_surigao:'Surigao', cebu_siquijor:'Siquijor'

// V101: passenger fare engine for connecting trips.
// Example: Cebu → Dumaguete = Cebu → Tagbilaran + Tagbilaran → Dumaguete.
// This changes passenger fare display/calculation only. Baggage slabs and baggage formulas remain untouched.
const CONNECTING_FARE_RULES = {
  cebu_dumaguete: { via:'Tagbilaran', legs:['cebu_tagbilaran','tagbilaran_dumaguete'] },
  cebu_siquijor: { via:'Tagbilaran', legs:['cebu_tagbilaran','tagbilaran_siquijor'] },
  cebu_surigao: { via:'Maasin', legs:['cebu_maasin','maasin_surigao'] }
};
const KNOWN_CONNECTION_PORTS = ['tagbilaran','maasin'];
const titleCase = str => String(str || '').replace(/_/g,' ').replace(/\b\w/g, ch => ch.toUpperCase());
const routeName = key => CEBU_ROUTE_LABELS[key] || (DB.schedules?.[key]?.title || key).replace(/^Cebu to /i,'');

function inferConnectingFareRule(route) {
  if (CONNECTING_FARE_RULES[route]) return CONNECTING_FARE_RULES[route];
  if (!route || !route.startsWith('cebu_')) return null;
  const dest = route.replace(/^cebu_/, '');
  const schedule = DB.schedules?.[route];
  const scheduleText = [
    schedule?.title || '',
    ...(schedule?.trips || []).flatMap(t => [t.remarks || '', t.vessel || ''])
  ].join(' ').toLowerCase();

  for (const via of KNOWN_CONNECTION_PORTS) {
    const firstLeg = `cebu_${via}`;
    const secondLeg = `${via}_${dest}`;
    const mentionsVia = scheduleText.includes(`via ${via}`) || scheduleText.includes(`through ${via}`) || scheduleText.includes(via);
    if (mentionsVia && DB.paxFares?.[firstLeg] && DB.paxFares?.[secondLeg]) {
      return { via:titleCase(via), legs:[firstLeg, secondLeg], inferred:true };
    }
  }
  return null;
}

function getPassengerFare(route) {
  const rule = inferConnectingFareRule(route);
  if (!rule) return DB.paxFares?.[route] || null;
  const combined = {};
  for (const cls of FARE_CLASSES) {
    let total = 0;
    for (const leg of rule.legs) {
      const amount = Number(DB.paxFares?.[leg]?.[cls]);
      if (!Number.isFinite(amount)) return DB.paxFares?.[route] || null;
      total += amount;
    }
    combined[cls] = total;
  }
  return combined;
}

function getFareRuleForDisplay(route) {
  return inferConnectingFareRule(route);
}

function fareBreakdownHtml(route) {
  const rule = getFareRuleForDisplay(route);
  if (!rule) return '';
  const rows = rule.legs.map(leg => {
    const fare = DB.paxFares?.[leg] || {};
    return `<tr><td>${DB.schedules?.[leg]?.title || titleCase(leg)}</td><td style="text-align:right">${fmtPHP(Number(fare['TC/OA'] || 0))}</td><td style="text-align:right">${fmtPHP(Number(fare['BC'] || 0))}</td></tr>`;
  }).join('');
  return `
    <div style="margin-top:10px;padding:10px;background:rgba(244,63,94,0.08);border:1px solid var(--border);border-radius:10px;font-size:0.78rem">
      <b>🔗 Connecting fare via ${rule.via}</b><br>
      <span style="color:var(--text2)">Passenger fare is auto-calculated by adding each leg.</span>
      <table style="margin-top:6px"><tr><th>Leg</th><th style="text-align:right">Tourist</th><th style="text-align:right">Business</th></tr>${rows}</table>
    </div>`;
}

function applyConnectingPassengerFares() {
  const keys = new Set([...Object.keys(CONNECTING_FARE_RULES), ...Object.keys(DB.schedules || {})]);
  keys.forEach(route => {
    const rule = inferConnectingFareRule(route);
    if (!rule) return;
    const combined = getPassengerFare(route);
    if (combined) DB.paxFares[route] = combined;
  });
}
applyConnectingPassengerFares();

function slabCost(E, rates) {
  const [r0, r1, r2] = rates;
  let t1 = Math.min(E, 10), rem = E - t1;
  let t2 = Math.min(Math.max(rem, 0), 30), rem2 = rem - t2;
  let t3 = Math.max(rem2, 0);
  return { t1, t2, t3, c1: t1*r0, c2: t2*r1, c3: t3*r2, total: t1*r0 + t2*r1 + t3*r2 };
}

function updateDashboard() {
  const s = DB.stats;
  $('statTrans').textContent = s.transactions;
  $('statRev').textContent = fmtPHP(s.revenue);
  $('statKg').textContent = s.totalKg + 'kg';
  $('statTop').textContent = s.topRoute || '--';
  const search = ($('dashSearch')?.value || '').toLowerCase();
  const rec = DB.comps.slice(-20).reverse().filter(c =>
  !search || c.route.toLowerCase().includes(search) || fmtPHP(c.total).includes(search)
  ).slice(0,5);
  $('recentList').innerHTML = rec.length? rec.map(c => `
    <div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:0.8rem">
      <span style="color:var(--accent)">${routeName(c.route)}</span> | ${c.mode} | ${c.pax||1}pax | ${c.weight}kg → <b>${fmtPHP(c.total)}</b>
    </div>
  `).join('') : '<p style="color:var(--text3)">No matching transactions</p>';
  
  // AI Load Predictor
  const coreRoutes = CEBU_BAGGAGE_ROUTES;
  const day = new Date().getDay();
  const isWeekend = day===0 || day===6;
  const mult = isWeekend ? 1.3 : 1.0;
  const preds = coreRoutes.map(k => {
    const sched = DB.schedules[k];
    const trips = sched ? sched.trips.length : 0;
    const base = trips * 28;
    const hist = DB.comps.filter(c => c.route===k).length;
    const score = Math.round((base + hist*5) * mult);
    return {k, name: routeName(k), score, trips};
  }).sort((a,b)=>b.score-a.score).slice(0,3);
  const predEl = $('aiPredictor');
  if (predEl) {
    predEl.innerHTML = preds.map(p => {
      const pct = Math.min(100, Math.round(p.score/ (preds[0].score||1)*100));
      return `<div style="margin:6px 0"><div style="display:flex;justify-content:space-between"><b>${p.name}</b><span>${p.score} est. bags</span></div><div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:linear-gradient(90deg,var(--accent),#ff9f43)"></div></div><div style="font-size:0.7rem;color:var(--text3)">${p.trips} trips today • ${isWeekend?'Weekend boost':'Weekday'}</div></div>`;
    }).join('');
  }

  drawMiniChart();
}

function drawMiniChart() {
  const canvas = $('miniChart'); if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const counts = DB.stats.routeCounts || {};
  const routes = Object.keys(counts).sort((a,b) => counts[b]-counts[a]).slice(0,5);
  const values = routes.map(k => counts[k]);
  const max = Math.max(...values, 1);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const barW = (canvas.width / Math.max(routes.length,1)) - 8;
  routes.forEach((route, i) => {
    const h = (values[i]/max)*80;
    ctx.fillStyle = '#f43f5e';
    ctx.fillRect(i*(barW+8), 100-h, barW, h);
    ctx.font = '8px sans-serif'; ctx.fillStyle = '#edeffc';
    ctx.fillText(route.substring(0,5), i*(barW+8), 115);
  });
}

let lastReceiptText = '';

function compute(override = null) {
  const p = override || getCalcParams();
  const { route, mode, cls, pax, weight, rounding } = p;
  const free = mode === 'normal'? DB.freeAllowance[cls] : 0;
  const freeTotal = free * pax;
  let excess = weight - freeTotal;
  if (excess < 0) excess = 0;
  let E = mode === 'normal'? excess / pax : weight;
  if (rounding === 'floor') E = Math.floor(E);
  const slab = slabCost(E, DB.slabs[route][mode]);
  const perPax = slab.total;
  const total = mode === 'normal'? perPax * pax : perPax;

  const steps = [
    `Free: ${free}kg × ${pax}pax = ${freeTotal}kg`,
    `Excess: ${weight}kg → ${excess.toFixed(1)}kg`,
    `E/pax: ${excess.toFixed(1)} ÷ ${pax} = ${E.toFixed(2)}kg`
  ];
  if (slab.t1>0) steps.push(`Tier1: ${slab.t1.toFixed(1)}kg × ₱${DB.slabs[route][mode][0]} = ₱${slab.c1.toFixed(2)}`);
  if (slab.t2>0) steps.push(`Tier2: ${slab.t2.toFixed(1)}kg × ₱${DB.slabs[route][mode][1]} = ₱${slab.c2.toFixed(2)}`);
  if (slab.t3>0) steps.push(`Tier3: ${slab.t3.toFixed(1)}kg × ₱${DB.slabs[route][mode][2]} = ₱${slab.c3.toFixed(2)}`);
  steps.push(`Per pax: ₱${perPax.toFixed(2)}`);
  steps.push(`Total: ${fmtPHP(total)}`);

  $('totalDisplay').textContent = fmtPHP(total);
  $('perPaxDisplay').textContent = mode==='normal'? `₱${perPax.toFixed(2)} per passenger` : 'Fragile cargo';
  $('stepsDisplay').innerHTML = steps.map(s => `<div>• ${s}</div>`).join('');
  $('resultCard').style.display='block';

  const receiptHtml = `
    <div style="text-align:center;font-weight:bold;font-size:1rem;margin-bottom:6px">⛴ Ocean Fast Ferries</div>
    <div style="text-align:center;font-size:0.7rem;margin-bottom:8px">BAGGAGE FEE RECEIPT</div>
    <div>Route: <b>${routeName(route)}</b></div><div>Mode: <b>${mode.toUpperCase()}</b></div>
    <div>${mode==='normal'?`Class: <b>${cls}</b> | Pax: <b>${pax}</b>`:`Fragile Cargo`}</div>
    <div>Weight: <b>${weight} kg</b></div>
    <hr style="margin:6px 0">${steps.map(s => `<div>${s}</div>`).join('')}<hr style="margin:6px 0">
    <div style="text-align:center;font-weight:bold;font-size:1.1rem">💵 TOTAL: ${fmtPHP(total)}</div>
    <div class="qr-code"></div>
    <div style="font-size:0.65rem;margin-top:6px;text-align:center">${new Date().toLocaleString()}</div>
  `;
  $('receipt').innerHTML = receiptHtml + `
    <div class="receipt-actions">
      <button class="primary-pdf" onclick="downloadReceiptPDF()">📄 Download PDF</button>
      <button onclick="downloadReceipt()">TXT Backup</button>
      <button onclick="printReceiptPDF()">Print / Save PDF</button>
    </div>`;
  $('receipt').style.display = 'block';
  lastReceiptText = [
    'Ocean Fast Ferries',
    'BAGGAGE FEE RECEIPT',
    'Route: ' + routeName(route),
    'Mode: ' + mode.toUpperCase(),
    mode === 'normal' ? ('Class: ' + cls + ' | Pax: ' + pax) : 'Fragile Cargo',
    'Weight: ' + weight + ' kg',
    '----------------------------------------',
    ...steps,
    '----------------------------------------',
    'TOTAL: ' + fmtPHP(total),
    'Date: ' + new Date().toLocaleString()
  ].join('\n');

  if (!override) {
    DB.stats.transactions++; DB.stats.revenue+=total; DB.stats.totalKg+=weight;
    if (!DB.stats.routeCounts[route]) DB.stats.routeCounts[route]=0;
    DB.stats.routeCounts[route]++;
    let top='',max=0;
    for(let [k,v] of Object.entries(DB.stats.routeCounts)) if(v>max){max=v;top=k;}
    DB.stats.topRoute=top;
    DB.comps.push({route,mode,cls,pax,weight,total,time:new Date().toISOString()});
    DB.history.push({route,mode,cls,pax,weight,total,time:new Date().toISOString()});
    saveDB(); updateDashboard();
  }
}

function receiptFileStamp() {
  return new Date().toISOString().slice(0,19).replace(/:/g, '-');
}

function downloadReceipt() {

}

function pdfSafeText(text) {
  return String(text || '')
    .replace(/₱/g, 'PHP ')
    .replace(/×/g, 'x')
    .replace(/→/g, '->')
    .replace(/[–—]/g, '-')
    .replace(/[“”]/g, '"')
    .replace(/[‘’]/g, "'")
    .replace(/[^\x09\x0A\x0D\x20-\x7E]/g, '');
}

function pdfEscape(text) {
  return pdfSafeText(text).replace(/\\/g, '\\\\').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
}

function wrapPdfLine(line, maxLen = 78) {
  const words = pdfSafeText(line).split(/\s+/);
  const out = [];
  let current = '';
  words.forEach(word => {
    if (!word) return;
    if ((current + ' ' + word).trim().length > maxLen) {
      if (current) out.push(current);
      current = word;
    } else {
      current = (current + ' ' + word).trim();
    }
  });
  if (current) out.push(current);
  return out.length ? out : [''];
}

function buildReceiptPDF(text) {
  const sourceLines = pdfSafeText(text).split(/\r?\n/);
  const lines = [];
  sourceLines.forEach((line, idx) => {
    if (idx === 0) return;
    wrapPdfLine(line, 74).forEach(w => lines.push(w));
  });

  let y = 790;
  const content = [];
  content.push('BT');
  content.push('/F1 18 Tf');
  content.push(`1 0 0 1 72 ${y} Tm (${pdfEscape('Ocean Fast Ferries')}) Tj`);
  y -= 26;
  content.push('/F1 11 Tf');
  content.push(`1 0 0 1 72 ${y} Tm (${pdfEscape('Baggage Fee Receipt')}) Tj`);
  y -= 22;
  content.push('/F1 10 Tf');
  content.push(`1 0 0 1 72 ${y} Tm (${pdfEscape('Generated: ' + new Date().toLocaleString())}) Tj`);
  y -= 24;
  content.push('/F1 10 Tf');
  lines.forEach(line => {
    if (y < 70) return;
    content.push(`1 0 0 1 72 ${y} Tm (${pdfEscape(line)}) Tj`);
    y -= 15;
  });
  content.push('ET');
  const stream = content.join('\n');

  const objects = [
    '1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n',
    '2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n',
    '3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595 842] /Resources << /Font << /F1 4 0 R >> >> /Contents 5 0 R >>\nendobj\n',
    '4 0 obj\n<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>\nendobj\n',
    `5 0 obj\n<< /Length ${stream.length} >>\nstream\n${stream}\nendstream\nendobj\n`
  ];
  let pdf = '%PDF-1.4\n';
  const offsets = [0];
  objects.forEach(obj => {
    offsets.push(pdf.length);
    pdf += obj;
  });
  const xrefOffset = pdf.length;
  pdf += `xref\n0 ${objects.length + 1}\n`;
  pdf += '0000000000 65535 f \n';
  offsets.slice(1).forEach(offset => {
    pdf += String(offset).padStart(10, '0') + ' 00000 n \n';
  });
  pdf += `trailer\n<< /Size ${objects.length + 1} /Root 1 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`;
  return pdf;
}

function downloadReceiptPDF() {
  if (!lastReceiptText) return toast('Compute a receipt first');
  const pdf = buildReceiptPDF(lastReceiptText);
  const blob = new Blob([pdf], { type: 'application/pdf' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ocean_baggage_receipt_${receiptFileStamp()}.pdf`;

}

function printReceiptPDF() {

    <style>body{font-family:Courier New,monospace;padding:20px;color:#111}.receipt{border:1px solid #111;padding:16px;max-width:360px;margin:auto}.receipt-actions,.receipt-download-btn{display:none!important}@media print{button{display:none}}</style>

  win.document.close();
}

function cashierAdjust() {
  const p = getCalcParams();
  if (p.mode === 'fragile') {
    let w = p.weight;
    if (w <= 0) { toast('Enter weight first'); return; }
    for (let testW = Math.floor(w)-1; testW >= 0; testW--) {
      let slab = slabCost(testW, DB.slabs[p.route].fragile);
      let tot = slab.total;
      if (Math.abs(tot % 1) < 0.001 && tot > 0) {
        $('weight').value = testW;
        compute();
        toast(`Adjusted to ${testW}kg → ${fmtPHP(tot)}`);
        return;
      }
    }
    toast('No whole-peso total found for Fragile');
    return;
  }
  const free = DB.freeAllowance[p.cls] * p.pax;
  let excess = p.weight - free;
  if (excess <= 0) { toast('No excess to adjust'); return; }
  for (let e = Math.floor(excess)-1; e>=0; e--) {
    let testW = e + free;
    let E = e / p.pax;
    let slab = slabCost(E, DB.slabs[p.route].normal);
    let tot = slab.total * p.pax;
    if (Math.abs(tot % 1) < 0.001) {
      $('weight').value = testW;
      compute();
      toast(`Adjusted to ${testW}kg → ${fmtPHP(tot)}`);
      return;
    }
  }
  toast('No whole-peso total found');
}

async function sendAIChat() {
  const q = $('chatInput').value.trim();
  if (!q) return;
  addChatMsg('user', q);
  $('chatInput').value = '';
  $('sendBtn').disabled = true;

  let response = '';
  const useAPI = DB.aiSettings.useAI && DB.aiSettings.apiKey && navigator.onLine;

  if (useAPI) {
    const loading = showLoading();
    try {
      response = await fetchGeminiResponse(q, chatContext);
      removeLoading(loading);
      if (!response) response = aiOfflineRespond(q);
    } catch {
      removeLoading(loading);
      response = aiOfflineRespond(q);
    }
  } else {
    response = aiOfflineRespond(q);
  }

  addChatMsg('bot', response);
  chatContext.push({ role:'user', content:q });
  chatContext.push({ role:'assistant', content:response });
  $('sendBtn').disabled = false;
}

async function fetchGeminiResponse(query, context) {
  const apiKey = DB.aiSettings.apiKey;
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
  const systemPrompt = `You are the official AI assistant for Ocean Fast Ferries (Cebu, Philippines).
Routes: Tagbilaran, Ormoc, Palompon, Dumaguete, Surigao, Getafe, Siquijor.
Baggage slabs: ${JSON.stringify(DB.slabs)}. Passenger fares: ${JSON.stringify(DB.paxFares)}.
Answer in a friendly, helpful tone. Always compute baggage fees using the slab rates if asked.
If you don't know something, say you'll connect to a human agent. Keep replies short.`;
  const recentContext = context.slice(-6).map(c => `${c.role}: ${c.content}`).join('\n');
  const body = {
    contents: [{ parts: [{ text: `${systemPrompt}\n\nPrevious chat:\n${recentContext}\nUser: ${query}` }] }],
    generationConfig: { temperature: 0.4, maxOutputTokens: 512 }
  };
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: AbortSignal.timeout(8000)
    });
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
    return text? text.trim() : null;
  } catch {
    return null;
  }
}

function aiOfflineRespond(q) {
  const ql = q.toLowerCase();
  if (/^(hi|hello|hey)/i.test(ql)) return "Hello! 👋 I'm the Ocean Fast Ferries genius AI. Ask me anything about baggage, fares, schedules, connections, or even tourist tips.";
  if (/thank(s| you)/i.test(ql)) return "You're very welcome! 😊 Need anything else?";
  if (/bye|good night|see you/i.test(ql)) return "Safe travels! ⛴ Goodbye!";
  if (ql.includes('help') || ql.includes('what can you')) return "I can:\n• Compute baggage fees (e.g., 'Price 2 pax 45kg Ormoc')\n• Show passenger fares\n• Display trip schedules\n• Explain connections (e.g., Cebu→Siquijor)\n• Tourist info\nJust ask naturally!";
  let calcMatch = q.match(/(\d+)\s*(?:pax|passengers?)?\s*(\d+\.?\d*)\s*(?:kg|kilos?)?\s*([a-zA-Z\s-]+)/i);
  if (!calcMatch) calcMatch = q.match(/(?:compute|calculate|how much|cost|price|fee)\s+(?:for\s+)?(\d+)\s*(?:pax|passengers?)?\s*(\d+\.?\d*)\s*(?:kg|kilos?)?\s*([a-zA-Z\s-]+)/i);
  if (calcMatch &&!isNaN(+calcMatch[1]) &&!isNaN(+calcMatch[2])) {
    const pax = +calcMatch[1], kg = +calcMatch[2], rw = calcMatch[3].toLowerCase().trim();
    const route = Object.keys(DB.slabs).find(r => rw.includes(r) || r.includes(rw));
    if (!route) return `I don't recognize route "${rw}". Available: ${Object.keys(DB.slabs).join(', ')}.`;
    const free = DB.freeAllowance.tourist;
    const excess = Math.max(0, kg - free*pax);
    const E = excess/pax;
    const total = slabCost(E, DB.slabs[route].normal).total * pax;
    return `📊 Normal baggage ${route.toUpperCase()}:\nPassengers: ${pax}\nWeight: ${kg}kg\nFree (tourist): ${free}kg×${pax}=${free*pax}kg\nExcess: ${excess.toFixed(1)}kg\nExcess/pax: ${E.toFixed(2)}kg\n\n💵 Total fee: ${fmtPHP(total)}`;
  }
  if (/\b(fare|ticket|price|cost)\b/i.test(q)) {
    for (let routeName of Object.keys(DB.paxFares)) {
      const simple = routeName.replace(/[^a-z ]/gi,' ').toLowerCase().trim();
      if (q.includes(simple) || simple.split(' ').some(w => q.includes(w))) {
        let cls = 'TC/OA';
        if (/business|bc/i.test(q)) cls='BC';
        else if (/student|st/i.test(q)) cls='ST';
        else if (/military|mi/i.test(q)) cls='MI';
        const fareSet = getPassengerFare(routeName);
        const price = fareSet?.[cls];
        const rule = getFareRuleForDisplay(routeName);
        if (price) return `Passenger fare ${routeName} (${cls}): ${fmtPHP(Number(price))}${rule ? `\nAuto-computed via ${rule.via}: ${rule.legs.map(leg => DB.schedules?.[leg]?.title || titleCase(leg)).join(' + ')}` : ''}`;
      }
    }
    return "Passenger fares (Tourist/TC):\n• Tagbilaran: direct fare\n• Ormoc/Palompon/Getafe/Maasin: direct fare\n• Dumaguete: Cebu→Tagbilaran + Tagbilaran→Dumaguete\n• Siquijor: Cebu→Tagbilaran + Tagbilaran→Siquijor\n• Surigao: Cebu→Maasin + Maasin→Surigao\nAsk for Business, Student, Military, or open the Fares tab for exact computed totals.";
  }
  if (/\b(schedule|trip|depart|time|vessel)\b/i.test(q)) {
    for (let routeKey of Object.keys(DB.schedules)) {
      if (q.includes(routeKey) || q.includes(DB.schedules[routeKey].title.toLowerCase())) {
        const sched = DB.schedules[routeKey];
        if (!sched.trips.length) return `No scheduled trips for ${sched.title} yet.`;
        return sched.trips.slice(0,6).map(t => `🕐 ${t.dep} → ${t.arr} (${t.vessel})${t.remarks?' - '+t.remarks:''}`).join('\n');
      }
    }
    return "Schedules available for: Tagbilaran, Ormoc, Getafe, Siquijor. Which route?";
  }
  if (/siquijor/i.test(q)) {
    if (q.includes('how to get') || q.includes('connection') || q.includes('go to')) {
      return "⛴ Cebu to Siquijor:\n• Direct ferry: OJ 788 (9:30 AM & 5:40 PM) - approx 3.5h\n• Via Tagbilaran: many trips, then connecting ferry (Tagbilaran→Siquijor, approx 1.5h). Total travel ~3.5h.\nFare (passenger) starts at ₱1,200.";
    }
    return "Siquijor route is available! Direct and via Tagbilaran. Fares start at ₱1,200 (Tourist). Ask for more details.";
  }
  if (/(free|allowance|free kg)/i.test(q)) return "Tourist: 10kg free per pax.\nBusiness: 20kg free per pax.";
  if (/(routes|destinations|where do you go)/i.test(q)) return "We sail to: Tagbilaran, Ormoc, Palompon, Dumaguete, Surigao, Getafe, and Siquijor.";
  if (/(ocean fast|about|company)/i.test(q)) return "Ocean Fast Ferries operates fast craft services in the Visayas region, connecting Cebu to major islands with reliable schedules. Baggage Pro is our intelligent management system.";
  if (/slab|rate per kg/i.test(q)) {
    let resp = "Slab rates (per kg) for normal baggage:\n";
    Object.entries(DB.slabs).forEach(([k,v])=> resp += `${k.toUpperCase()}: ${v.normal[0]} / ${v.normal[1]} / ${v.normal[2]}\n`);
    return resp;
  }
  return "I'm not sure how to answer that. Try:\n• 'Price 2 pax 30kg Tagbilaran'\n• 'Siquijor schedule'\n• 'Business fare to Ormoc'\n• 'Free allowance'\n• 'Help'";
}

      <div id="arScanList" class="v102-scan-list"></div>
    </div>
  `;
}

async function startAR(){
  ensureOpsStyles();
  const status = $('arStatus');
  const badge = $('arModeBadge');
  try{
    stopAR(false);
    if(!navigator.mediaDevices?.getUserMedia) throw new Error('Camera is not supported on this browser.');
    status.textContent = 'Requesting camera permission...';
    badge.textContent = 'CAMERA';
    arStream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'}, width:{ideal:1280}, height:{ideal:720}},
      audio:false
    });
    const video = $('arVideo');
    video.srcObject = arStream;
    await video.play();
    if(!window.cocoSsd) throw new Error('AI model library is still loading or unavailable.');
    if(!arModel){
      status.textContent = 'Loading AI baggage model...';
      badge.textContent = 'AI LOAD';
      arModel = await cocoSsd.load({base:'lite_mobilenet_v2'});
    }
    arRunning = true;
    arDetectedItems = [];
    badge.textContent = 'SCANNING';
    status.textContent = 'Scanning live video. Keep bags separated for better detection.';
    toast('AR scanner active');
    arLoop();
  }catch(e){
    console.error(e);
    if(status) status.textContent = e.message || 'Camera access failed. Please allow permission and try again.';
    if(badge) badge.textContent = 'ERROR';
    if(window.top !== window.self && status){
      status.innerHTML = 'Camera may be blocked inside an embed. Open the GitHub Pages site directly in the browser, then allow camera permission.';
    }
    toast('AR scanner could not start');
  }
}

function stopAR(showToast = true){
  arRunning = false;
  if(arAnimationFrame) cancelAnimationFrame(arAnimationFrame);
  arAnimationFrame = null;
  if(arStream){
    arStream.getTracks().forEach(track=>track.stop());
    arStream = null;
  }
  const video = $('arVideo');
  if(video) video.srcObject = null;
  const overlay = $('arOverlay');
  if(overlay) overlay.innerHTML = '';
  const badge = $('arModeBadge');
  if(badge) badge.textContent = 'READY';
  if(showToast) toast('AR scanner stopped');
}

function estimateBaggageKg(prediction, videoWidth, videoHeight){
  const [, , width, height] = prediction.bbox;
  const frameArea = Math.max(1, videoWidth * videoHeight);
  const ratio = (width * height) / frameArea;
  const base = prediction.class === 'suitcase' ? 32 : prediction.class === 'backpack' ? 14 : 8;
  return Math.max(2, Math.round(base + ratio * 95));
}

function renderARDetections(predictions, video){
  const overlay = $('arOverlay');
  const list = $('arScanList');
  if(!overlay || !list) return;
  overlay.innerHTML = '';
  const rect = video.getBoundingClientRect();
  const scaleX = rect.width / Math.max(1, video.videoWidth);
  const scaleY = rect.height / Math.max(1, video.videoHeight);
  arDetectedItems = predictions.map((p, index)=>{
    const [x,y,w,h] = p.bbox;
    const kg = estimateBaggageKg(p, video.videoWidth, video.videoHeight);
    const confidence = Math.round((p.score || 0) * 100);
    const box = document.createElement('div');
    box.className = 'ar-box';
    box.style.left = `${x * scaleX}px`;
    box.style.top = `${y * scaleY}px`;
    box.style.width = `${w * scaleX}px`;
    box.style.height = `${h * scaleY}px`;
    const label = document.createElement('div');
    label.className = 'ar-label';
    label.textContent = `${p.class} • ${kg}kg • ${confidence}%`;
    box.appendChild(label);
    overlay.appendChild(box);
    return {label:p.class, kg, confidence, index:index+1};
  });
  const totalKg = arDetectedItems.reduce((sum,item)=>sum + item.kg, 0);
  const avgConfidence = arDetectedItems.length ? Math.round(arDetectedItems.reduce((sum,item)=>sum+item.confidence,0)/arDetectedItems.length) : 0;
  if($('arCount')) $('arCount').textContent = arDetectedItems.length;
  if($('arWeight')) $('arWeight').textContent = `${totalKg}kg`;
  if($('arConfidence')) $('arConfidence').textContent = arDetectedItems.length ? `${avgConfidence}%` : '--';
  list.innerHTML = arDetectedItems.length ? arDetectedItems.map(item=>`
    <div class="v102-scan-row">
      <strong>#${item.index} ${item.label.toUpperCase()}</strong> • estimated ${item.kg}kg • ${item.confidence}% confidence
      <div class="v102-meter"><span style="width:${Math.min(100,item.confidence)}%"></span></div>
    </div>`).join('') : '<div class="v102-scan-row" style="color:var(--text3)">No baggage object detected yet.</div>';
  if($('arStatus')) $('arStatus').textContent = arDetectedItems.length ? `Detected ${arDetectedItems.length} baggage object(s). Estimated visual load: ${totalKg}kg.` : 'Scanning... place baggage clearly inside the camera frame.';
}

async function arLoop(timestamp = 0){
  if(!arRunning) return;
  const video = $('arVideo');
  if(video && video.readyState >= 2 && arModel && (!arLastScan || timestamp - arLastScan > 420)){
    arLastScan = timestamp;
    try{
      const all = await arModel.detect(video);
      const baggage = all
        .filter(p=>['suitcase','backpack','handbag'].includes(p.class) && p.score >= 0.45)
        .sort((a,b)=>b.score-a.score)
        .slice(0,8);
      renderARDetections(baggage, video);
    }catch(e){
      console.error(e);
      if($('arStatus')) $('arStatus').textContent = 'Scanner paused because the AI model returned an error. Try stopping and starting again.';
    }
  }
  arAnimationFrame = requestAnimationFrame(arLoop);
}

function captureARSnapshot(){
  if(!arDetectedItems.length){ toast('No detected baggage to snapshot yet'); return; }
  const totalKg = arDetectedItems.reduce((sum,item)=>sum+item.kg,0);
  const summary = arDetectedItems.map(item=>`#${item.index} ${item.label} ${item.kg}kg (${item.confidence}%)`).join('\n');
  const text = `Ocean Fast Ferries AR Scan\n${new Date().toLocaleString()}\nDetected: ${arDetectedItems.length}\nEstimated visual load: ${totalKg}kg\n\n${summary}`;
  const blob = new Blob([text], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ar_baggage_scan_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.txt`;
  a.click();
  toast('AR scan snapshot exported');
}

function parseRoutePorts(routeKey){
  const parts = String(routeKey || '').split('_');
  if(parts.length < 2) return null;
  return {from:parts[0], to:parts[1]};
}

function parseTripMinutes(timeText){
  const match = String(timeText || '').trim().match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
  if(!match) return null;
  let h = parseInt(match[1],10);
  const m = parseInt(match[2],10);
  const meridiem = (match[3] || '').toUpperCase();
  if(meridiem === 'PM' && h !== 12) h += 12;
  if(meridiem === 'AM' && h === 12) h = 0;
  return h * 60 + m;
}

function formatClockFromMinutes(total){
  if(total == null) return '--:--';
  total = ((Math.round(total) % 1440) + 1440) % 1440;
  let h = Math.floor(total / 60);
  const m = total % 60;
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
}

function minutesUntilDeparture(dep){
  const mins = parseTripMinutes(dep);
  if(mins == null) return null;
  const now = new Date();
  const current = now.getHours() * 60 + now.getMinutes();
  let diff = mins - current;
  if(diff < -45) diff += 24 * 60;
  return diff;
}

function getTripTravelMinutes(trip, sched){
  const dep = parseTripMinutes(trip.dep);
  const arr = parseTripMinutes(trip.arr);
  if(dep != null && arr != null){
    let diff = arr - dep;
    if(diff <= 0) diff += 1440;
    return diff;
  }
  const match = String(sched?.travel || '').match(/(?:(\d+)h)?\s*(?:(\d+)m)?/i);
  if(match){
    const h = parseInt(match[1] || '0',10);
    const m = parseInt(match[2] || '0',10);
    return Math.max(30, h*60 + m);
  }
  return 120;
}

function routeDestination(routeKey){
  const p = parseRoutePorts(routeKey);
  if(!p) return 'default';
  return p.from === 'cebu' ? p.to : p.from;
}

function routeColor(routeKey){
  return MAP_ROUTE_COLORS[routeDestination(routeKey)] || MAP_ROUTE_COLORS.default;
}

function mapStatusFromTrip(until, travelMinutes){
  if(until == null) return 'later';
  if(until <= 0 && Math.abs(until) <= travelMinutes) return 'active';
  if(until > 0 && until <= 20) return 'boarding';
  if(until > 20 && until <= 90) return 'soon';
  return 'later';
}

function statusLabel(status){
  return status === 'boarding' ? 'BOARDING' : status === 'soon' ? 'SOON' : status === 'active' ? 'EN ROUTE' : 'SCHEDULED';
}

function statusEta(v){
  if(v.until == null) return 'ETA unavailable';
  if(v.status === 'active') return `En route • ETA ${v.etaText}`;
  if(v.until <= 0) return 'Boarding / departing now';
  return `${v.until} min to departure`;
}

function vesselProgress(until, travelMinutes, index){
  if(until == null) return 8 + ((index * 11) % 72);
  if(until > 0) return Math.max(4, Math.min(22, 22 - Math.min(until, 120) / 120 * 18));
  const traveled = Math.min(travelMinutes, Math.abs(until));
  return Math.max(8, Math.min(96, traveled / travelMinutes * 100));
}

function buildCebuVesselFeed(){
  const rows = [];
  Object.entries(DB?.schedules || {}).forEach(([routeKey, sched])=>{
    const ports = parseRoutePorts(routeKey);
    if(!ports || (ports.from !== 'cebu' && ports.to !== 'cebu')) return;
    const fromCoord = PORT_COORDS[ports.from];
    const toCoord = PORT_COORDS[ports.to];
    if(!fromCoord || !toCoord) return;
    (sched.trips || []).forEach((trip, index)=>{
      const until = minutesUntilDeparture(trip.dep);
      const travelMinutes = getTripTravelMinutes(trip, sched);
      const status = mapStatusFromTrip(until, travelMinutes);
      const progress = vesselProgress(until, travelMinutes, index);
      const lat = fromCoord[0] + (toCoord[0] - fromCoord[0]) * (progress / 100);
      const lng = fromCoord[1] + (toCoord[1] - fromCoord[1]) * (progress / 100);
      const arrMinutes = parseTripMinutes(trip.arr);
      const etaText = arrMinutes != null ? formatClockFromMinutes(arrMinutes) : formatClockFromMinutes(parseTripMinutes(trip.dep) + travelMinutes);
      const destination = routeDestination(routeKey);
      const color = routeColor(routeKey);
      const key = `${routeKey}-${index}-${trip.dep}-${trip.vessel}`.replace(/[^a-zA-Z0-9_-]/g,'_');
      rows.push({key, routeKey, title:sched.title, vessel:trip.vessel || 'TBA', dep:trip.dep, arr:trip.arr || etaText, etaText, remarks:trip.remarks || '', from:ports.from, to:ports.to, destination, fromCoord, toCoord, lat, lng, progress, status, until, index, travelMinutes, color});
    });
  });
  return rows
    .filter(v=>{
      if(mapSelectedRoute !== 'all' && v.destination !== mapSelectedRoute && v.routeKey !== mapSelectedRoute) return false;
      if(mapSelectedStatus !== 'all' && v.status !== mapSelectedStatus) return false;
      if(mapSearchTerm){
        const q = mapSearchTerm.toLowerCase();
        const hay = `${v.routeKey} ${v.title} ${v.vessel} ${v.dep} ${v.arr} ${v.remarks}`.toLowerCase();
        if(!hay.includes(q)) return false;
      }
      return true;
    })
    .sort((a,b)=>(a.until ?? 9999) - (b.until ?? 9999))
    .slice(0,28);
}

function getMapSummary(feed){
  return {
    total: feed.length,
    boarding: feed.filter(v=>v.status==='boarding').length,
    active: feed.filter(v=>v.status==='active').length,
    next: feed[0]?.dep || '--'
  };
}

function getCebuDestinations(){
  const set = new Set();
  Object.keys(DB?.schedules || {}).forEach(routeKey=>{
    const p = parseRoutePorts(routeKey);
    if(!p || (p.from !== 'cebu' && p.to !== 'cebu')) return;
    set.add(routeDestination(routeKey));
  });
  return Array.from(set).sort();
}

function escapeHtml(value){
  return String(value ?? '').replace(/[&<>"]/g, ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
}

function renderVesselRow(v){
  return `<div class="v104-vessel-row ${mapFocusedVesselKey===v.key?'active':''}" data-key="${v.key}" onclick="selectVessel('${v.key}')" style="border-left-color:${v.color}">
    <div class="v104-row-head"><strong>${escapeHtml(v.vessel)}</strong><span class="v104-status ${v.status}">${statusLabel(v.status)}</span></div>
    <div>${escapeHtml(v.title)} • ${escapeHtml(v.dep)} → ${escapeHtml(v.arr || v.etaText)}</div>
    <div class="v104-route-note">${statusEta(v)}${v.remarks ? ' • ' + escapeHtml(v.remarks) : ''}</div>
    <div class="v104-meter"><span style="width:${Math.round(v.progress)}%;background:linear-gradient(90deg,${v.color},#38bdf8)"></span></div>
  </div>`;
}

function setMapRouteFilter(value){ mapSelectedRoute = value || 'all'; refreshLiveMap(false); }
function setMapStatusFilter(value){ mapSelectedStatus = value || 'all'; refreshLiveMap(false); }
function setMapSearch(value){ mapSearchTerm = value || ''; refreshLiveMap(false); }
function resetMapFilters(){ mapSelectedRoute = 'all'; mapSelectedStatus = 'all'; mapSearchTerm = ''; refreshLiveMap(true); }

function makeVesselIcon(v){
  const html = `<div class="v104-pulse-marker" style="color:${v.status === 'boarding' ? '#22c55e' : v.status === 'soon' ? '#f59e0b' : v.status === 'active' ? '#38bdf8' : '#94a3b8'}"></div>`;
  return L.divIcon({className:'', html, iconSize:[24,24], iconAnchor:[12,12], popupAnchor:[0,-10]});
}

function makePortIcon(){
  return L.divIcon({className:'', html:'<div class="v104-port-marker">⚓</div>', iconSize:[24,24], iconAnchor:[12,12], popupAnchor:[0,-10]});
}

function initMap(){
  ensureOpsStyles();
  ensureFuturisticMapStyles();
  const feed = buildCebuVesselFeed();
  if(!window.L){
    $('liveMap').innerHTML = '<div style="padding:18px;color:var(--text2)">Map library unavailable. Vessel board is still available below.</div>';
    return;
  }
  if(map){ try{ map.remove(); }catch(e){} map = null; }
  if(mapLiveTimer){ clearInterval(mapLiveTimer); mapLiveTimer = null; }
  map = L.map('liveMap',{zoomControl:true,attributionControl:true,preferCanvas:true}).setView([10.25,124.15],7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap'}).addTo(map);
  vesselRoutesLayer = L.layerGroup().addTo(map);
  vesselMarkers = [];
  const bounds = [];
  const portSeen = new Set();
  feed.forEach(v=>{
    [v.from, v.to].forEach(port=>{
      if(portSeen.has(port)) return;
      const coord = PORT_COORDS[port];
      if(!coord) return;
      portSeen.add(port);
      L.marker(coord,{icon:makePortIcon()}).addTo(vesselRoutesLayer).bindPopup(`<div class="v104-popup"><b>${PORT_LABELS[port] || port}</b><br>Port Node</div>`);
      bounds.push(coord);
    });
    L.polyline([v.fromCoord, v.toCoord],{color:v.color,weight:v.status==='active'?5:3,opacity:v.status==='later'?.42:.72,dashArray:v.status==='active'?null:'8,8'}).addTo(vesselRoutesLayer);
    const marker = L.marker([v.lat,v.lng],{icon:makeVesselIcon(v)}).addTo(vesselRoutesLayer);
    marker.bindPopup(`<div class="v104-popup"><b>${escapeHtml(v.vessel)}</b><br>${escapeHtml(v.title)}<br>Departure: ${escapeHtml(v.dep)}<br>ETA/Arrival: ${escapeHtml(v.arr || v.etaText)}<br><span class="tag">${statusLabel(v.status)}</span></div>`);
    marker.bindTooltip(`${v.vessel} • ${statusLabel(v.status)}`,{permanent:false,direction:'top'});
    marker.on('click',()=>selectVessel(v.key, false));
    vesselMarkers.push({marker, data:v});
    bounds.push([v.lat,v.lng], v.fromCoord, v.toCoord);
  });
  if(bounds.length){ map.fitBounds(bounds,{padding:[28,28]}); }
  setTimeout(()=>{ try{ map.invalidateSize(); }catch(e){} }, 250);
  mapLiveTimer = setInterval(updateLiveMapPositions, 4500);
}

function refreshLiveMap(showToast = true){
  const feed = buildCebuVesselFeed();
  const list = $('vesselStatusList');
  if(list) list.innerHTML = feed.length ? feed.slice(0,10).map(v=>renderVesselRow(v)).join('') : '<div class="v104-vessel-row">No Cebu vessel schedule available for the selected filters.</div>';
  const details = $('v104VesselDetails');
  if(details && mapFocusedVesselKey){
    const selected = feed.find(v=>v.key===mapFocusedVesselKey);
    details.innerHTML = selected ? renderVesselDetails(selected) : 'Selected vessel is hidden by current filters.';
  }
  initMap();
  if(showToast) toast('Cebu command map refreshed');
}

function renderVesselDetails(v){
  return `<strong style="color:var(--accent)">${escapeHtml(v.vessel)}</strong><br>
    ${escapeHtml(v.title)}<br>
    Status: <b>${statusLabel(v.status)}</b> • ${statusEta(v)}<br>
    Route intelligence: ${escapeHtml(PORT_LABELS[v.from] || v.from)} → ${escapeHtml(PORT_LABELS[v.to] || v.to)} • Travel window ${v.travelMinutes} min<br>
    ${v.remarks ? 'Note: '+escapeHtml(v.remarks) : 'No route note.'}`;
}

function selectVessel(key, panMap = true){
  mapFocusedVesselKey = key;
  const feed = buildCebuVesselFeed();
  const selected = feed.find(v=>v.key===key) || vesselMarkers.find(m=>m.data.key===key)?.data;
  const details = $('v104VesselDetails');
  if(details && selected) details.innerHTML = renderVesselDetails(selected);
  document.querySelectorAll('.v104-vessel-row').forEach(row=>row.classList.toggle('active', row.dataset.key === key));
  const markerEntry = vesselMarkers.find(m=>m.data.key===key);
  if(markerEntry && map && panMap){
    map.setView(markerEntry.marker.getLatLng(), 10, {animate:true});
    markerEntry.marker.openPopup();
  }
}

function focusNextVessel(){
  if(!vesselMarkers.length || !map){ toast('No vessel marker available'); return; }
  const next = vesselMarkers[0];
  selectVessel(next.data.key, false);
  map.setView(next.marker.getLatLng(), 10, {animate:true});
  next.marker.openPopup();
}

function updateLiveMapPositions(){
  if(!vesselMarkers.length) return;
  vesselMarkers.forEach(entry=>{
    const v = entry.data;
    const latLng = entry.marker.getLatLng();
    const towardLat = v.toCoord[0] - latLng.lat;
    const towardLng = v.toCoord[1] - latLng.lng;
    const nudge = v.status === 'active' ? .035 : .012;
    entry.marker.setLatLng([latLng.lat + towardLat * nudge + (Math.random()-.5)*.004, latLng.lng + towardLng * nudge + (Math.random()-.5)*.004]);
  });
}

function exportMapManifest(){
  const feed = buildCebuVesselFeed();
  if(!feed.length){ toast('No vessel rows to export'); return; }
  const rows = [['Vessel','Route','Departure','Arrival/ETA','Status','Progress','Remarks']];
  feed.forEach(v=>rows.push([v.vessel, v.title, v.dep, v.arr || v.etaText, statusLabel(v.status), `${Math.round(v.progress)}%`, v.remarks]));
  const csv = rows.map(r=>r.map(cell=>`"${String(cell ?? '').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `cebu_live_map_manifest_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('Map manifest exported');
}
