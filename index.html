      } catch (e) { /* ignore */ }

    }

  function onFrame() {

    frameCount++;

      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()

    }

  }

      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {

  cebu_maasin:'Maasin', cebu_dumaguete:'Dumaguete', cebu_surigao:'Surigao', cebu_siquijor:'Siquijor'

// V101: passenger fare engine for connecting trips.
// Example: Cebu → Dumaguete = Cebu → Tagbilaran + Tagbilaran → Dumaguete.
// This changes passenger fare display/calculation only. Baggage slabs and baggage formulas remain untouched.
const CONNECTING_FARE_RULES = {
  cebu_dumaguete: { via:'Tagbilaran', legs:['cebu_tagbilaran','tagbilaran_dumaguete'] },
  cebu_siquijor: { via:'Tagbilaran', legs:['cebu_tagbilaran','tagbilaran_siquijor'] },
  cebu_surigao: { via:'Maasin', legs:['cebu_maasin','maasin_surigao'] }
};
const KNOWN_CONNECTION_PORTS = ['tagbilaran','maasin'];
const titleCase = str => String(str || '').replace(/_/g,' ').replace(/\b\w/g, ch => ch.toUpperCase());
const routeName = key => CEBU_ROUTE_LABELS[key] || (DB.schedules?.[key]?.title || key).replace(/^Cebu to /i,'');

function inferConnectingFareRule(route) {
  if (CONNECTING_FARE_RULES[route]) return CONNECTING_FARE_RULES[route];
  if (!route || !route.startsWith('cebu_')) return null;
  const dest = route.replace(/^cebu_/, '');
  const schedule = DB.schedules?.[route];
  const scheduleText = [
    schedule?.title || '',
    ...(schedule?.trips || []).flatMap(t => [t.remarks || '', t.vessel || ''])
  ].join(' ').toLowerCase();

  for (const via of KNOWN_CONNECTION_PORTS) {
    const firstLeg = `cebu_${via}`;
    const secondLeg = `${via}_${dest}`;
    const mentionsVia = scheduleText.includes(`via ${via}`) || scheduleText.includes(`through ${via}`) || scheduleText.includes(via);
    if (mentionsVia && DB.paxFares?.[firstLeg] && DB.paxFares?.[secondLeg]) {
      return { via:titleCase(via), legs:[firstLeg, secondLeg], inferred:true };
    }
  }
  return null;
}

function getPassengerFare(route) {
  const rule = inferConnectingFareRule(route);
  if (!rule) return DB.paxFares?.[route] || null;
  const combined = {};
  for (const cls of FARE_CLASSES) {
    let total = 0;
    for (const leg of rule.legs) {
      const amount = Number(DB.paxFares?.[leg]?.[cls]);
      if (!Number.isFinite(amount)) return DB.paxFares?.[route] || null;
      total += amount;
    }
    combined[cls] = total;
  }
  return combined;
}

function getFareRuleForDisplay(route) {
  return inferConnectingFareRule(route);
}

function fareBreakdownHtml(route) {
  const rule = getFareRuleForDisplay(route);
  if (!rule) return '';
  const rows = rule.legs.map(leg => {
    const fare = DB.paxFares?.[leg] || {};
    return `<tr><td>${DB.schedules?.[leg]?.title || titleCase(leg)}</td><td style="text-align:right">${fmtPHP(Number(fare['TC/OA'] || 0))}</td><td style="text-align:right">${fmtPHP(Number(fare['BC'] || 0))}</td></tr>`;
  }).join('');
  return `
    <div style="margin-top:10px;padding:10px;background:rgba(244,63,94,0.08);border:1px solid var(--border);border-radius:10px;font-size:0.78rem">
      <b>🔗 Connecting fare via ${rule.via}</b><br>
      <span style="color:var(--text2)">Passenger fare is auto-calculated by adding each leg.</span>
      <table style="margin-top:6px"><tr><th>Leg</th><th style="text-align:right">Tourist</th><th style="text-align:right">Business</th></tr>${rows}</table>
    </div>`;
}

function applyConnectingPassengerFares() {
  const keys = new Set([...Object.keys(CONNECTING_FARE_RULES), ...Object.keys(DB.schedules || {})]);
  keys.forEach(route => {
    const rule = inferConnectingFareRule(route);
    if (!rule) return;
    const combined = getPassengerFare(route);
    if (combined) DB.paxFares[route] = combined;
  });
}
applyConnectingPassengerFares();

function slabCost(E, rates) {
  const [r0, r1, r2] = rates;
  let t1 = Math.min(E, 10), rem = E - t1;
  let t2 = Math.min(Math.max(rem, 0), 30), rem2 = rem - t2;
  let t3 = Math.max(rem2, 0);
  return { t1, t2, t3, c1: t1*r0, c2: t2*r1, c3: t3*r2, total: t1*r0 + t2*r1 + t3*r2 };
}

function updateDashboard() {
  const s = DB.stats;
  $('statTrans').textContent = s.transactions;
  $('statRev').textContent = fmtPHP(s.revenue);
  $('statKg').textContent = s.totalKg + 'kg';
  $('statTop').textContent = s.topRoute || '--';
  const search = ($('dashSearch')?.value || '').toLowerCase();
  const rec = DB.comps.slice(-20).reverse().filter(c =>
  !search || c.route.toLowerCase().includes(search) || fmtPHP(c.total).includes(search)
  ).slice(0,5);
  $('recentList').innerHTML = rec.length? rec.map(c => `
    <div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:0.8rem">
      <span style="color:var(--accent)">${routeName(c.route)}</span> | ${c.mode} | ${c.pax||1}pax | ${c.weight}kg → <b>${fmtPHP(c.total)}</b>
    </div>
  `).join('') : '<p style="color:var(--text3)">No matching transactions</p>';
  
  // AI Load Predictor
  const coreRoutes = CEBU_BAGGAGE_ROUTES;
  const day = new Date().getDay();
  const isWeekend = day===0 || day===6;
  const mult = isWeekend ? 1.3 : 1.0;
  const preds = coreRoutes.map(k => {
    const sched = DB.schedules[k];
    const trips = sched ? sched.trips.length : 0;
    const base = trips * 28;
    const hist = DB.comps.filter(c => c.route===k).length;
    const score = Math.round((base + hist*5) * mult);
    return {k, name: routeName(k), score, trips};
  }).sort((a,b)=>b.score-a.score).slice(0,3);
  const predEl = $('aiPredictor');
  if (predEl) {
    predEl.innerHTML = preds.map(p => {
      const pct = Math.min(100, Math.round(p.score/ (preds[0].score||1)*100));
      return `<div style="margin:6px 0"><div style="display:flex;justify-content:space-between"><b>${p.name}</b><span>${p.score} est. bags</span></div><div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:linear-gradient(90deg,var(--accent),#ff9f43)"></div></div><div style="font-size:0.7rem;color:var(--text3)">${p.trips} trips today • ${isWeekend?'Weekend boost':'Weekday'}</div></div>`;
    }).join('');
  }

  drawMiniChart();
}

function drawMiniChart() {
  const canvas = $('miniChart'); if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const counts = DB.stats.routeCounts || {};
  const routes = Object.keys(counts).sort((a,b) => counts[b]-counts[a]).slice(0,5);
  const values = routes.map(k => counts[k]);
  const max = Math.max(...values, 1);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const barW = (canvas.width / Math.max(routes.length,1)) - 8;
  routes.forEach((route, i) => {
    const h = (values[i]/max)*80;
    ctx.fillStyle = '#f43f5e';
    ctx.fillRect(i*(barW+8), 100-h, barW, h);
    ctx.font = '8px sans-serif'; ctx.fillStyle = '#edeffc';
    ctx.fillText(route.substring(0,5), i*(barW+8), 115);
  });
}

let lastReceiptText = '';

function compute(override = null) {
  const p = override || getCalcParams();
  const { route, mode, cls, pax, weight, rounding } = p;
  const free = mode === 'normal'? DB.freeAllowance[cls] : 0;
  const freeTotal = free * pax;
  let excess = weight - freeTotal;
  if (excess < 0) excess = 0;
  let E = mode === 'normal'? excess / pax : weight;
  if (rounding === 'floor') E = Math.floor(E);
  const slab = slabCost(E, DB.slabs[route][mode]);
  const perPax = slab.total;
  const total = mode === 'normal'? perPax * pax : perPax;

  const steps = [
    `Free: ${free}kg × ${pax}pax = ${freeTotal}kg`,
    `Excess: ${weight}kg → ${excess.toFixed(1)}kg`,
    `E/pax: ${excess.toFixed(1)} ÷ ${pax} = ${E.toFixed(2)}kg`
  ];
  if (slab.t1>0) steps.push(`Tier1: ${slab.t1.toFixed(1)}kg × ₱${DB.slabs[route][mode][0]} = ₱${slab.c1.toFixed(2)}`);
  if (slab.t2>0) steps.push(`Tier2: ${slab.t2.toFixed(1)}kg × ₱${DB.slabs[route][mode][1]} = ₱${slab.c2.toFixed(2)}`);
  if (slab.t3>0) steps.push(`Tier3: ${slab.t3.toFixed(1)}kg × ₱${DB.slabs[route][mode][2]} = ₱${slab.c3.toFixed(2)}`);
  steps.push(`Per pax: ₱${perPax.toFixed(2)}`);
  steps.push(`Total: ${fmtPHP(total)}`);

  $('totalDisplay').textContent = fmtPHP(total);
  $('perPaxDisplay').textContent = mode==='normal'? `₱${perPax.toFixed(2)} per passenger` : 'Fragile cargo';
  $('stepsDisplay').innerHTML = steps.map(s => `<div>• ${s}</div>`).join('');
  $('resultCard').style.display='block';

  const receiptHtml = `
    <div style="text-align:center;font-weight:bold;font-size:1rem;margin-bottom:6px">⛴ Ocean Fast Ferries</div>
    <div style="text-align:center;font-size:0.7rem;margin-bottom:8px">BAGGAGE FEE RECEIPT</div>
    <div>Route: <b>${routeName(route)}</b></div><div>Mode: <b>${mode.toUpperCase()}</b></div>
    <div>${mode==='normal'?`Class: <b>${cls}</b> | Pax: <b>${pax}</b>`:`Fragile Cargo`}</div>
    <div>Weight: <b>${weight} kg</b></div>
    <hr style="margin:6px 0">${steps.map(s => `<div>${s}</div>`).join('')}<hr style="margin:6px 0">
    <div style="text-align:center;font-weight:bold;font-size:1.1rem">💵 TOTAL: ${fmtPHP(total)}</div>
    <div class="qr-code"></div>
    <div style="font-size:0.65rem;margin-top:6px;text-align:center">${new Date().toLocaleString()}</div>
  `;
  $('receipt').innerHTML = receiptHtml + `
    <div class="receipt-actions">
      <button class="primary-pdf" onclick="downloadReceiptPDF()">📄 Download PDF</button>
      <button onclick="downloadReceipt()">TXT Backup</button>
      <button onclick="printReceiptPDF()">Print / Save PDF</button>
    </div>`;
  $('receipt').style.display = 'block';
  lastReceiptText = [
    'Ocean Fast Ferries',
    'BAGGAGE FEE RECEIPT',
    'Route: ' + routeName(route),
    'Mode: ' + mode.toUpperCase(),
    mode === 'normal' ? ('Class: ' + cls + ' | Pax: ' + pax) : 'Fragile Cargo',
    'Weight: ' + weight + ' kg',
    '----------------------------------------',
    ...steps,
    '----------------------------------------',
    'TOTAL: ' + fmtPHP(total),
    'Date: ' + new Date().toLocaleString()
  ].join('\n');

  if (!override) {
    DB.stats.transactions++; DB.stats.revenue+=total; DB.stats.totalKg+=weight;
    if (!DB.stats.routeCounts[route]) DB.stats.routeCounts[route]=0;
    DB.stats.routeCounts[route]++;
    let top='',max=0;
    for(let [k,v] of Object.entries(DB.stats.routeCounts)) if(v>max){max=v;top=k;}
    DB.stats.topRoute=top;
    DB.comps.push({route,mode,cls,pax,weight,total,time:new Date().toISOString()});
    DB.history.push({route,mode,cls,pax,weight,total,time:new Date().toISOString()});
    saveDB(); updateDashboard();
  }
}

function receiptFileStamp() {
  return new Date().toISOString().slice(0,19).replace(/:/g, '-');
}

function downloadReceipt() {

}

function pdfSafeText(text) {
  return String(text || '')
    .replace(/₱/g, 'PHP ')
    .replace(/×/g, 'x')
    .replace(/→/g, '->')
    .replace(/[–—]/g, '-')
    .replace(/[“”]/g, '"')
    .replace(/[‘’]/g, "'")
    .replace(/[^\x09\x0A\x0D\x20-\x7E]/g, '');
}

function pdfEscape(text) {
  return pdfSafeText(text).replace(/\\/g, '\\\\').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
}

function wrapPdfLine(line, maxLen = 78) {
  const words = pdfSafeText(line).split(/\s+/);
  const out = [];
  let current = '';
  words.forEach(word => {
    if (!word) return;
    if ((current + ' ' + word).trim().length > maxLen) {
      if (current) out.push(current);
      current = word;
    } else {
      current = (current + ' ' + word).trim();
    }
  });
  if (current) out.push(current);
  return out.length ? out : [''];
}

function buildReceiptPDF(text) {
  const sourceLines = pdfSafeText(text).split(/\r?\n/);
  const lines = [];
  sourceLines.forEach((line, idx) => {
    if (idx === 0) return;
    wrapPdfLine(line, 74).forEach(w => lines.push(w));
  });

  let y = 790;
  const content = [];
  content.push('BT');
  content.push('/F1 18 Tf');
  content.push(`1 0 0 1 72 ${y} Tm (${pdfEscape('Ocean Fast Ferries')}) Tj`);
  y -= 26;
  content.push('/F1 11 Tf');
  content.push(`1 0 0 1 72 ${y} Tm (${pdfEscape('Baggage Fee Receipt')}) Tj`);
  y -= 22;
  content.push('/F1 10 Tf');
  content.push(`1 0 0 1 72 ${y} Tm (${pdfEscape('Generated: ' + new Date().toLocaleString())}) Tj`);
  y -= 24;
  content.push('/F1 10 Tf');
  lines.forEach(line => {
    if (y < 70) return;
    content.push(`1 0 0 1 72 ${y} Tm (${pdfEscape(line)}) Tj`);
    y -= 15;
  });
  content.push('ET');
  const stream = content.join('\n');

  const objects = [
    '1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n',
    '2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n',
    '3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595 842] /Resources << /Font << /F1 4 0 R >> >> /Contents 5 0 R >>\nendobj\n',
    '4 0 obj\n<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>\nendobj\n',
    `5 0 obj\n<< /Length ${stream.length} >>\nstream\n${stream}\nendstream\nendobj\n`
  ];
  let pdf = '%PDF-1.4\n';
  const offsets = [0];
  objects.forEach(obj => {
    offsets.push(pdf.length);
    pdf += obj;
  });
  const xrefOffset = pdf.length;
  pdf += `xref\n0 ${objects.length + 1}\n`;
  pdf += '0000000000 65535 f \n';
  offsets.slice(1).forEach(offset => {
    pdf += String(offset).padStart(10, '0') + ' 00000 n \n';
  });
  pdf += `trailer\n<< /Size ${objects.length + 1} /Root 1 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`;
  return pdf;
}

function downloadReceiptPDF() {
  if (!lastReceiptText) return toast('Compute a receipt first');
  const pdf = buildReceiptPDF(lastReceiptText);
  const blob = new Blob([pdf], { type: 'application/pdf' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ocean_baggage_receipt_${receiptFileStamp()}.pdf`;

}

function printReceiptPDF() {
  const receipt = $('receipt');

    <style>body{font-family:Courier New,monospace;padding:20px;color:#111}.receipt{border:1px solid #111;padding:16px;max-width:360px;margin:auto}.receipt-actions,.receipt-download-btn{display:none!important}@media print{button{display:none}}</style>

  win.document.close();
}

function cashierAdjust() {
  const p = getCalcParams();
  if (p.mode === 'fragile') {
    let w = p.weight;
    if (w <= 0) { toast('Enter weight first'); return; }
    for (let testW = Math.floor(w)-1; testW >= 0; testW--) {
      let slab = slabCost(testW, DB.slabs[p.route].fragile);
      let tot = slab.total;
      if (Math.abs(tot % 1) < 0.001 && tot > 0) {
        $('weight').value = testW;
        compute();
        toast(`Adjusted to ${testW}kg → ${fmtPHP(tot)}`);
        return;
      }
    }
    toast('No whole-peso total found for Fragile');
    return;
  }
  const free = DB.freeAllowance[p.cls] * p.pax;
  let excess = p.weight - free;
  if (excess <= 0) { toast('No excess to adjust'); return; }
  for (let e = Math.floor(excess)-1; e>=0; e--) {
    let testW = e + free;
    let E = e / p.pax;
    let slab = slabCost(E, DB.slabs[p.route].normal);
    let tot = slab.total * p.pax;
    if (Math.abs(tot % 1) < 0.001) {
      $('weight').value = testW;
      compute();
      toast(`Adjusted to ${testW}kg → ${fmtPHP(tot)}`);
      return;
    }
  }
  toast('No whole-peso total found');
}

function addNewRoute() {
  const name = prompt('Enter new route key (e.g., "cebu-bohol")');
  if (!name) return;
  const key = name.toLowerCase().trim();
  if (DB.slabs[key]) return toast('Route already exists');
  DB.slabs[key] = { normal:[0,0,0], fragile:[0,0,0] };
  DB.schedules[key] = { title:name, travel:'?', trips:[] };
  DB.paxFares[key] = { 'TC/OA':0, 'BC':0, 'ST':0, 'MI':0 };
  saveDB(); showAdminView('routes'); toast('Route added');
}

function saveAllFares() {
  for (let route of Object.keys(DB.paxFares)) {
    for (let cls of Object.keys(DB.paxFares[route])) {
      const uniqueId = safeId(`fare_${route}_${cls}`);
      const inp = document.getElementById(uniqueId);
      if (inp) DB.paxFares[route][cls] = parseFloat(inp.value) || 0;

function changeCredentials() {
  const role = prompt('Change credentials for (cashier/supervisor)?', 'supervisor');
  if (!role ||!['cashier','supervisor'].includes(role)) return;
  const u = prompt(`New ${role} username`, DB.creds[role]?.u || '');

  DB.creds[role] = { u, p }; saveDB(); toast('Credentials updated');

function exportDatabase() {
  const blob = new Blob([JSON.stringify(DB, null, 2)], { type:'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `ocean_ferries_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importDatabase(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.slabs) throw new Error('Invalid');
      Object.assign(DB, data); saveDB(); toast('Restored'); location.reload();
    } catch { toast('Invalid file'); }
  };
  reader.readAsText(file);
}

const GEMINI_MODEL_OPTIONS = [
  'gemini-3.5-flash',
  'gemini-3.1-flash',
  'gemini-3-flash',
  'gemini-2.5-flash',

function maskKey(key) {
  if (!key) return 'none';
  const clean = String(key).trim();
  return clean.length <= 10 ? 'saved key' : `${clean.slice(0, 5)}…${clean.slice(-4)}`;
}

function updateGeminiStatus(message, tone = 'info') {
  const text = String(message || '');

  if (el) {
    const color = tone === 'ok' ? '#22c55e' : tone === 'warn' ? '#fb923c' : tone === 'bad' ? '#f43f5e' : 'var(--text2)';
    el.style.color = color;
    el.textContent = text;
  }
  DB.aiSettings.lastStatus = text;
}

function getGeminiEndpoint(model) {
  return `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent`;
}

function getGeminiModelsEndpoint() {
  return 'https://generativelanguage.googleapis.com/v1beta/models';
}

function normalizeGeminiModelName(name) {

}

function geminiErrorMessage(status, payloadText) {
  let detail = '';
  try {
    const parsed = JSON.parse(payloadText || '{}');
    detail = parsed?.error?.message || payloadText || '';
  } catch {
    detail = payloadText || '';
  }
  detail = String(detail || '').trim();
  if (status === 0) return `Gemini network error: ${detail || 'No response. Check internet, browser CORS, or key restrictions.'}`;
  if (status === 400) return `Gemini error 400: request/model format problem. ${detail}`;
  if (status === 401) return `Gemini error 401: API key is missing or invalid. ${detail}`;
  if (status === 403) return `Gemini error 403: API key permission/referrer restriction problem. ${detail}`;
  if (status === 404) return `Gemini error 404: model not found or not available for this key. ${detail}`;
  if (status === 429) return `Gemini error 429: rate limit or quota exceeded. ${detail}`;
  if (status === 500 || status === 503 || status === 504) return `Gemini server busy/unavailable (${status}). ${detail}`;
  return `Gemini HTTP ${status}: ${detail || 'Unknown error'}`;
}

async function fetchWithTimeout(url, options = {}, timeoutMs = 20000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    return await fetch(url, { ...options, signal: controller.signal });
  } catch (err) {
    if (err?.name === 'AbortError') throw new Error(`Gemini request timed out after ${Math.round(timeoutMs / 1000)} seconds.`);
    throw new Error(`Gemini network error: ${err?.message || err}`);
  } finally {
    clearTimeout(timer);
  }
}

async function listGeminiModels() {
  if (!DB.aiSettings.apiKey) throw new Error('No Gemini API key saved. Open Settings and paste your key.');
  const res = await fetchWithTimeout(getGeminiModelsEndpoint(), {
    method: 'GET',
    headers: { 'x-goog-api-key': DB.aiSettings.apiKey }
  }, Number(DB.aiSettings.timeoutMs || 20000));
  const textBody = await res.text();
  if (!res.ok) throw new Error(geminiErrorMessage(res.status, textBody));
  const data = JSON.parse(textBody || '{}');
  const models = (data.models || [])
    .filter(m => Array.isArray(m.supportedGenerationMethods) && m.supportedGenerationMethods.includes('generateContent'))
    .map(m => normalizeGeminiModelName(m.name))
    .filter(Boolean);
  DB.aiSettings.availableModels = models;
  saveDB();
  return models;
}

function preferredGeminiModels(availableModels = []) {
  const preferred = DB.aiSettings.model || 'auto';
  const available = Array.isArray(availableModels) && availableModels.length ? availableModels : DB.aiSettings.availableModels || [];
  const configured = preferred !== 'auto' ? [preferred] : [];
  const priority = [...configured, ...GEMINI_MODEL_OPTIONS];
  const combined = available.length
    ? [...priority.filter(m => available.includes(m)), ...available.filter(m => !priority.includes(m))]
    : priority;
  return [...new Set(combined)].filter(Boolean);
}

async function callGeminiModel(model, query, context) {
  const recentContext = context.slice(-8).map(c => `${c.role}: ${c.content}`).join('\n');
  const body = {
    system_instruction: { parts: [{ text: buildGeminiSystemPrompt() }] },
    contents: [{
      role: 'user',
      parts: [{ text: `Previous chat:\n${recentContext || '(none)'}\n\nUser: ${query}` }]
    }],
    generationConfig: { temperature: 0.35, maxOutputTokens: 700 }
  };
  const res = await fetchWithTimeout(getGeminiEndpoint(model), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-goog-api-key': DB.aiSettings.apiKey },
    body: JSON.stringify(body)
  }, Number(DB.aiSettings.timeoutMs || 20000));
  const textBody = await res.text();
  if (!res.ok) throw new Error(geminiErrorMessage(res.status, textBody));
  const data = JSON.parse(textBody || '{}');
  const text = data?.candidates?.[0]?.content?.parts?.map(p => p.text || '').join('').trim();
  if (!text) {
    const finish = data?.candidates?.[0]?.finishReason || 'empty response';
    throw new Error(`Gemini returned no text (${finish}).`);
  }
  return { text, model };
}

async function fetchGeminiResponse(query, context) {
  if (!DB.aiSettings.apiKey) throw new Error('No Gemini API key saved. Open Settings and paste your key.');
  if (!navigator.onLine) throw new Error('Device is offline.');

  let available = [];
  try {
    available = await listGeminiModels();
  } catch (err) {
    // Listing can fail for some restricted keys; still try direct generateContent with configured fallbacks.
    available = [];
  }

  const models = preferredGeminiModels(available);
  let lastError = null;
  for (const model of models) {
    try {
      const result = await callGeminiModel(model, query, context);
      DB.aiSettings.lastModel = result.model;
      if (DB.aiSettings.model === 'auto') DB.aiSettings.model = result.model;
      saveDB();
      return result;
    } catch (err) {
      lastError = err;
      const msg = String(err?.message || err);
      // Continue only for model/server errors; stop for bad key, permission, quota, or request restrictions.
      if (!/404|model not found|model|500|503|504|busy|unavailable/i.test(msg)) break;
    }
  }
  throw lastError || new Error('Gemini request failed with no available model.');
}

async function testGeminiApi() {
  saveApiKey();
  if (!DB.aiSettings.apiKey) return;
  const btn = document.activeElement;
  if (btn) btn.disabled = true;
  const diagnostics = [];
  diagnostics.push(`Key: ${maskKey(DB.aiSettings.apiKey)}`);
  diagnostics.push(`Page: ${location.protocol}//${location.host || 'local file'}`);
  diagnostics.push(`Online: ${navigator.onLine ? 'yes' : 'no'}`);
  diagnostics.push(`Selected model: ${DB.aiSettings.model || 'auto'}`);
  updateGeminiStatus(`Testing Gemini...\n${diagnostics.join('\n')}`, 'info');
  try {
    const models = await listGeminiModels();
    diagnostics.push(`Models discovered: ${models.slice(0, 8).join(', ') || 'none'}`);
    const result = await fetchGeminiResponse('Reply with exactly: Gemini connected.', []);
    DB.aiSettings.lastModel = result.model;
    DB.aiSettings.lastStatus = `✅ Gemini connected using ${result.model}\n${diagnostics.join('\n')}`;
    saveDB();
    updateGeminiStatus(DB.aiSettings.lastStatus, 'ok');
    toast('Gemini connected');
  } catch (err) {
    DB.aiSettings.lastStatus = `❌ Gemini failed\n${diagnostics.join('\n')}\nError: ${String(err?.message || err)}`;
    saveDB();
    updateGeminiStatus(DB.aiSettings.lastStatus, 'bad');
    toast('Gemini test failed');
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function sendAIChat() {
  const q = $('chatInput').value.trim();
  if (!q) return;
  addChatMsg('user', q);
  $('chatInput').value = '';
  $('sendBtn').disabled = true;

  const useAPI = Boolean(DB.aiSettings.useAI && DB.aiSettings.apiKey && navigator.onLine);
  if (useAPI) {
    const loading = showLoading();
    try {
      const result = await fetchGeminiResponse(q, chatContext);
      removeLoading(loading);
      DB.aiSettings.lastStatus = `✅ Last Gemini reply used ${result.model}`;
      saveDB();
      addChatMsg('bot', result.text);
      chatContext.push({ role:'user', content:q });
      chatContext.push({ role:'assistant', content:result.text });
      $('sendBtn').disabled = false;
      return;
    } catch (err) {
      removeLoading(loading);
      const message = String(err?.message || err);
      DB.aiSettings.lastStatus = `❌ ${message}`;
      saveDB();
      const fallback = aiOfflineRespond(q);
      addChatMsg('bot', `Gemini did not connect.\n${message}\n\nBuilt-in answer:\n${fallback}`);
      chatContext.push({ role:'user', content:q });
      chatContext.push({ role:'assistant', content:fallback });
      $('sendBtn').disabled = false;
      return;
    }
  }

  addChatMsg('bot', response);
  chatContext.push({ role:'user', content:q });
  chatContext.push({ role:'assistant', content:response });
  $('sendBtn').disabled = false;
}

function aiOfflineRespond(q) {
  const ql = q.toLowerCase();
  if (/^(hi|hello|hey)/i.test(ql)) return "Hello! 👋 I'm the Ocean Fast Ferries genius AI. Ask me anything about baggage, fares, schedules, connections, or even tourist tips.";
  if (/thank(s| you)/i.test(ql)) return "You're very welcome! 😊 Need anything else?";
  if (/bye|good night|see you/i.test(ql)) return "Safe travels! ⛴ Goodbye!";
  if (ql.includes('help') || ql.includes('what can you')) return "I can:\n• Compute baggage fees (e.g., 'Price 2 pax 45kg Ormoc')\n• Show passenger fares\n• Display trip schedules\n• Explain connections (e.g., Cebu→Siquijor)\n• Tourist info\nJust ask naturally!";
  let calcMatch = q.match(/(\d+)\s*(?:pax|passengers?)?\s*(\d+\.?\d*)\s*(?:kg|kilos?)?\s*([a-zA-Z\s-]+)/i);
  if (!calcMatch) calcMatch = q.match(/(?:compute|calculate|how much|cost|price|fee)\s+(?:for\s+)?(\d+)\s*(?:pax|passengers?)?\s*(\d+\.?\d*)\s*(?:kg|kilos?)?\s*([a-zA-Z\s-]+)/i);
  if (calcMatch &&!isNaN(+calcMatch[1]) &&!isNaN(+calcMatch[2])) {
    const pax = +calcMatch[1], kg = +calcMatch[2], rw = calcMatch[3].toLowerCase().trim();
    const route = Object.keys(DB.slabs).find(r => rw.includes(r) || r.includes(rw));
    if (!route) return `I don't recognize route "${rw}". Available: ${Object.keys(DB.slabs).join(', ')}.`;
    const free = DB.freeAllowance.tourist;
    const excess = Math.max(0, kg - free*pax);
    const E = excess/pax;
    const total = slabCost(E, DB.slabs[route].normal).total * pax;
    return `📊 Normal baggage ${route.toUpperCase()}:\nPassengers: ${pax}\nWeight: ${kg}kg\nFree (tourist): ${free}kg×${pax}=${free*pax}kg\nExcess: ${excess.toFixed(1)}kg\nExcess/pax: ${E.toFixed(2)}kg\n\n💵 Total fee: ${fmtPHP(total)}`;
  }
  if (/\b(fare|ticket|price|cost)\b/i.test(q)) {
    for (let routeName of Object.keys(DB.paxFares)) {
      const simple = routeName.replace(/[^a-z ]/gi,' ').toLowerCase().trim();
      if (q.includes(simple) || simple.split(' ').some(w => q.includes(w))) {
        let cls = 'TC/OA';
        if (/business|bc/i.test(q)) cls='BC';
        else if (/student|st/i.test(q)) cls='ST';
        else if (/military|mi/i.test(q)) cls='MI';
        const fareSet = getPassengerFare(routeName);
        const price = fareSet?.[cls];
        const rule = getFareRuleForDisplay(routeName);
        if (price) return `Passenger fare ${routeName} (${cls}): ${fmtPHP(Number(price))}${rule ? `\nAuto-computed via ${rule.via}: ${rule.legs.map(leg => DB.schedules?.[leg]?.title || titleCase(leg)).join(' + ')}` : ''}`;
      }
    }
    return "Passenger fares (Tourist/TC):\n• Tagbilaran: direct fare\n• Ormoc/Palompon/Getafe/Maasin: direct fare\n• Dumaguete: Cebu→Tagbilaran + Tagbilaran→Dumaguete\n• Siquijor: Cebu→Tagbilaran + Tagbilaran→Siquijor\n• Surigao: Cebu→Maasin + Maasin→Surigao\nAsk for Business, Student, Military, or open the Fares tab for exact computed totals.";
  }
  if (/\b(schedule|trip|depart|time|vessel)\b/i.test(q)) {
    for (let routeKey of Object.keys(DB.schedules)) {
      if (q.includes(routeKey) || q.includes(DB.schedules[routeKey].title.toLowerCase())) {
        const sched = DB.schedules[routeKey];
        if (!sched.trips.length) return `No scheduled trips for ${sched.title} yet.`;
        return sched.trips.slice(0,6).map(t => `🕐 ${t.dep} → ${t.arr} (${t.vessel})${t.remarks?' - '+t.remarks:''}`).join('\n');
      }
    }
    return "Schedules available for: Tagbilaran, Ormoc, Getafe, Siquijor. Which route?";
  }
  if (/siquijor/i.test(q)) {
    if (q.includes('how to get') || q.includes('connection') || q.includes('go to')) {
      return "⛴ Cebu to Siquijor:\n• Direct ferry: OJ 788 (9:30 AM & 5:40 PM) - approx 3.5h\n• Via Tagbilaran: many trips, then connecting ferry (Tagbilaran→Siquijor, approx 1.5h). Total travel ~3.5h.\nFare (passenger) starts at ₱1,200.";
    }
    return "Siquijor route is available! Direct and via Tagbilaran. Fares start at ₱1,200 (Tourist). Ask for more details.";
  }
  if (/(free|allowance|free kg)/i.test(q)) return "Tourist: 10kg free per pax.\nBusiness: 20kg free per pax.";
  if (/(routes|destinations|where do you go)/i.test(q)) return "We sail to: Tagbilaran, Ormoc, Palompon, Dumaguete, Surigao, Getafe, and Siquijor.";
  if (/(ocean fast|about|company)/i.test(q)) return "Ocean Fast Ferries operates fast craft services in the Visayas region, connecting Cebu to major islands with reliable schedules. Baggage Pro is our intelligent management system.";
  if (/slab|rate per kg/i.test(q)) {
    let resp = "Slab rates (per kg) for normal baggage:\n";
    Object.entries(DB.slabs).forEach(([k,v])=> resp += `${k.toUpperCase()}: ${v.normal[0]} / ${v.normal[1]} / ${v.normal[2]}\n`);
    return resp;
  }
  return "I'm not sure how to answer that. Try:\n• 'Price 2 pax 30kg Tagbilaran'\n• 'Siquijor schedule'\n• 'Business fare to Ormoc'\n• 'Free allowance'\n• 'Help'";
}

function parseRoutePorts(routeKey){
  const parts = String(routeKey || '').split('_');
  if(parts.length < 2) return null;
  return {from:parts[0], to:parts[1]};
}

function parseTripMinutes(timeText){
  const match = String(timeText || '').trim().match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
  if(!match) return null;
  let h = parseInt(match[1],10);
  const m = parseInt(match[2],10);
  const meridiem = (match[3] || '').toUpperCase();
  if(meridiem === 'PM' && h !== 12) h += 12;
  if(meridiem === 'AM' && h === 12) h = 0;
  return h * 60 + m;
}

function formatClockFromMinutes(total){
  if(total == null) return '--:--';
  total = ((Math.round(total) % 1440) + 1440) % 1440;
  let h = Math.floor(total / 60);
  const m = total % 60;
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
}

function minutesUntilDeparture(dep){
  const mins = parseTripMinutes(dep);
  if(mins == null) return null;
  const now = new Date();
  const current = now.getHours() * 60 + now.getMinutes();
  let diff = mins - current;
  if(diff < -45) diff += 24 * 60;
  return diff;
}

function getTripTravelMinutes(trip, sched){
  const dep = parseTripMinutes(trip.dep);
  const arr = parseTripMinutes(trip.arr);
  if(dep != null && arr != null){
    let diff = arr - dep;
    if(diff <= 0) diff += 1440;
    return diff;
  }
  const match = String(sched?.travel || '').match(/(?:(\d+)h)?\s*(?:(\d+)m)?/i);
  if(match){
    const h = parseInt(match[1] || '0',10);
    const m = parseInt(match[2] || '0',10);
    return Math.max(30, h*60 + m);
  }
  return 120;
}

function routeDestination(routeKey){
  const p = parseRoutePorts(routeKey);
  if(!p) return 'default';
  return p.from === 'cebu' ? p.to : p.from;
}

function routeColor(routeKey){
  return MAP_ROUTE_COLORS[routeDestination(routeKey)] || MAP_ROUTE_COLORS.default;
}

function mapStatusFromTrip(until, travelMinutes){
  if(until == null) return 'later';
  if(until <= 0 && Math.abs(until) <= travelMinutes) return 'active';
  if(until > 0 && until <= 20) return 'boarding';
  if(until > 20 && until <= 90) return 'soon';
  return 'later';
}

function statusLabel(status){
  return status === 'boarding' ? 'BOARDING' : status === 'soon' ? 'SOON' : status === 'active' ? 'EN ROUTE' : 'SCHEDULED';
}

function statusEta(v){
  if(v.until == null) return 'ETA unavailable';
  if(v.status === 'active') return `En route • ETA ${v.etaText}`;
  if(v.until <= 0) return 'Boarding / departing now';
  return `${v.until} min to departure`;
}

function vesselProgress(until, travelMinutes, index){
  if(until == null) return 8 + ((index * 11) % 72);
  if(until > 0) return Math.max(4, Math.min(22, 22 - Math.min(until, 120) / 120 * 18));
  const traveled = Math.min(travelMinutes, Math.abs(until));
  return Math.max(8, Math.min(96, traveled / travelMinutes * 100));
}

function buildCebuVesselFeed(){
  const rows = [];
  Object.entries(DB?.schedules || {}).forEach(([routeKey, sched])=>{
    const ports = parseRoutePorts(routeKey);
    if(!ports || (ports.from !== 'cebu' && ports.to !== 'cebu')) return;
    const fromCoord = PORT_COORDS[ports.from];
    const toCoord = PORT_COORDS[ports.to];
    if(!fromCoord || !toCoord) return;
    (sched.trips || []).forEach((trip, index)=>{
      const until = minutesUntilDeparture(trip.dep);
      const travelMinutes = getTripTravelMinutes(trip, sched);
      const status = mapStatusFromTrip(until, travelMinutes);
      const progress = vesselProgress(until, travelMinutes, index);
      const lat = fromCoord[0] + (toCoord[0] - fromCoord[0]) * (progress / 100);
      const lng = fromCoord[1] + (toCoord[1] - fromCoord[1]) * (progress / 100);
      const arrMinutes = parseTripMinutes(trip.arr);
      const etaText = arrMinutes != null ? formatClockFromMinutes(arrMinutes) : formatClockFromMinutes(parseTripMinutes(trip.dep) + travelMinutes);
      const destination = routeDestination(routeKey);
      const color = routeColor(routeKey);
      const key = `${routeKey}-${index}-${trip.dep}-${trip.vessel}`.replace(/[^a-zA-Z0-9_-]/g,'_');
      rows.push({key, routeKey, title:sched.title, vessel:trip.vessel || 'TBA', dep:trip.dep, arr:trip.arr || etaText, etaText, remarks:trip.remarks || '', from:ports.from, to:ports.to, destination, fromCoord, toCoord, lat, lng, progress, status, until, index, travelMinutes, color});
    });
  });
  return rows
    .filter(v=>{
      if(mapSelectedRoute !== 'all' && v.destination !== mapSelectedRoute && v.routeKey !== mapSelectedRoute) return false;
      if(mapSelectedStatus !== 'all' && v.status !== mapSelectedStatus) return false;
      if(mapSearchTerm){
        const q = mapSearchTerm.toLowerCase();
        const hay = `${v.routeKey} ${v.title} ${v.vessel} ${v.dep} ${v.arr} ${v.remarks}`.toLowerCase();
        if(!hay.includes(q)) return false;
      }
      return true;
    })
    .sort((a,b)=>(a.until ?? 9999) - (b.until ?? 9999))
    .slice(0,28);
}

function getMapSummary(feed){
  return {
    total: feed.length,
    boarding: feed.filter(v=>v.status==='boarding').length,
    active: feed.filter(v=>v.status==='active').length,
    next: feed[0]?.dep || '--'
  };
}

function getCebuDestinations(){
  const set = new Set();
  Object.keys(DB?.schedules || {}).forEach(routeKey=>{
    const p = parseRoutePorts(routeKey);
    if(!p || (p.from !== 'cebu' && p.to !== 'cebu')) return;
    set.add(routeDestination(routeKey));
  });
  return Array.from(set).sort();
}

function escapeHtml(value){
  return String(value ?? '').replace(/[&<>"]/g, ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
}

function renderVesselRow(v){
  return `<div class="v104-vessel-row ${mapFocusedVesselKey===v.key?'active':''}" data-key="${v.key}" onclick="selectVessel('${v.key}')" style="border-left-color:${v.color}">
    <div class="v104-row-head"><strong>${escapeHtml(v.vessel)}</strong><span class="v104-status ${v.status}">${statusLabel(v.status)}</span></div>
    <div>${escapeHtml(v.title)} • ${escapeHtml(v.dep)} → ${escapeHtml(v.arr || v.etaText)}</div>
    <div class="v104-route-note">${statusEta(v)}${v.remarks ? ' • ' + escapeHtml(v.remarks) : ''}</div>
    <div class="v104-meter"><span style="width:${Math.round(v.progress)}%;background:linear-gradient(90deg,${v.color},#38bdf8)"></span></div>
  </div>`;
}

function setMapRouteFilter(value){ mapSelectedRoute = value || 'all'; refreshLiveMap(false); }
function setMapStatusFilter(value){ mapSelectedStatus = value || 'all'; refreshLiveMap(false); }
function setMapSearch(value){ mapSearchTerm = value || ''; refreshLiveMap(false); }
function resetMapFilters(){ mapSelectedRoute = 'all'; mapSelectedStatus = 'all'; mapSearchTerm = ''; refreshLiveMap(true); }

function makeVesselIcon(v){
  const html = `<div class="v104-pulse-marker" style="color:${v.status === 'boarding' ? '#22c55e' : v.status === 'soon' ? '#f59e0b' : v.status === 'active' ? '#38bdf8' : '#94a3b8'}"></div>`;
  return L.divIcon({className:'', html, iconSize:[24,24], iconAnchor:[12,12], popupAnchor:[0,-10]});
}

function makePortIcon(){
  return L.divIcon({className:'', html:'<div class="v104-port-marker">⚓</div>', iconSize:[24,24], iconAnchor:[12,12], popupAnchor:[0,-10]});
}

function initMap(){
  ensureOpsStyles();
  ensureFuturisticMapStyles();
  const feed = buildCebuVesselFeed();
  if(!window.L){
    $('liveMap').innerHTML = '<div style="padding:18px;color:var(--text2)">Map library unavailable. Vessel board is still available below.</div>';
    return;
  }
  if(map){ try{ map.remove(); }catch(e){} map = null; }
  if(mapLiveTimer){ clearInterval(mapLiveTimer); mapLiveTimer = null; }
  map = L.map('liveMap',{zoomControl:true,attributionControl:true,preferCanvas:true}).setView([10.25,124.15],7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap'}).addTo(map);
  vesselRoutesLayer = L.layerGroup().addTo(map);
  vesselMarkers = [];
  const bounds = [];
  const portSeen = new Set();
  feed.forEach(v=>{
    [v.from, v.to].forEach(port=>{
      if(portSeen.has(port)) return;
      const coord = PORT_COORDS[port];
      if(!coord) return;
      portSeen.add(port);
      L.marker(coord,{icon:makePortIcon()}).addTo(vesselRoutesLayer).bindPopup(`<div class="v104-popup"><b>${PORT_LABELS[port] || port}</b><br>Port Node</div>`);
      bounds.push(coord);
    });
    L.polyline([v.fromCoord, v.toCoord],{color:v.color,weight:v.status==='active'?5:3,opacity:v.status==='later'?.42:.72,dashArray:v.status==='active'?null:'8,8'}).addTo(vesselRoutesLayer);
    const marker = L.marker([v.lat,v.lng],{icon:makeVesselIcon(v)}).addTo(vesselRoutesLayer);
    marker.bindPopup(`<div class="v104-popup"><b>${escapeHtml(v.vessel)}</b><br>${escapeHtml(v.title)}<br>Departure: ${escapeHtml(v.dep)}<br>ETA/Arrival: ${escapeHtml(v.arr || v.etaText)}<br><span class="tag">${statusLabel(v.status)}</span></div>`);
    marker.bindTooltip(`${v.vessel} • ${statusLabel(v.status)}`,{permanent:false,direction:'top'});
    marker.on('click',()=>selectVessel(v.key, false));
    vesselMarkers.push({marker, data:v});
    bounds.push([v.lat,v.lng], v.fromCoord, v.toCoord);
  });
  if(bounds.length){ map.fitBounds(bounds,{padding:[28,28]}); }
  setTimeout(()=>{ try{ map.invalidateSize(); }catch(e){} }, 250);
  mapLiveTimer = setInterval(updateLiveMapPositions, 9000);
}

function refreshLiveMap(showToast = true){
  const feed = buildCebuVesselFeed();
  const list = $('vesselStatusList');
  if(list) list.innerHTML = feed.length ? feed.slice(0,10).map(v=>renderVesselRow(v)).join('') : '<div class="v104-vessel-row">No Cebu vessel schedule available for the selected filters.</div>';
  const details = $('v104VesselDetails');
  if(details && mapFocusedVesselKey){
    const selected = feed.find(v=>v.key===mapFocusedVesselKey);
    details.innerHTML = selected ? renderVesselDetails(selected) : 'Selected vessel is hidden by current filters.';
  }
  initMap();
  if(showToast) toast('Cebu command map refreshed');
}

function renderVesselDetails(v){
  return `<strong style="color:var(--accent)">${escapeHtml(v.vessel)}</strong><br>
    ${escapeHtml(v.title)}<br>
    Status: <b>${statusLabel(v.status)}</b> • ${statusEta(v)}<br>
    Route intelligence: ${escapeHtml(PORT_LABELS[v.from] || v.from)} → ${escapeHtml(PORT_LABELS[v.to] || v.to)} • Travel window ${v.travelMinutes} min<br>
    ${v.remarks ? 'Note: '+escapeHtml(v.remarks) : 'No route note.'}`;
}

function selectVessel(key, panMap = true){
  mapFocusedVesselKey = key;
  const feed = buildCebuVesselFeed();
  const selected = feed.find(v=>v.key===key) || vesselMarkers.find(m=>m.data.key===key)?.data;
  const details = $('v104VesselDetails');
  if(details && selected) details.innerHTML = renderVesselDetails(selected);
  document.querySelectorAll('.v104-vessel-row').forEach(row=>row.classList.toggle('active', row.dataset.key === key));
  const markerEntry = vesselMarkers.find(m=>m.data.key===key);
  if(markerEntry && map && panMap){
    map.setView(markerEntry.marker.getLatLng(), 10, {animate:true});
    markerEntry.marker.openPopup();
  }
}

function focusNextVessel(){
  if(!vesselMarkers.length || !map){ toast('No vessel marker available'); return; }
  const next = vesselMarkers[0];
  selectVessel(next.data.key, false);
  map.setView(next.marker.getLatLng(), 10, {animate:true});
  next.marker.openPopup();
}

function updateLiveMapPositions(){
  if(!vesselMarkers.length) return;
  vesselMarkers.forEach(entry=>{
    const v = entry.data;
    const latLng = entry.marker.getLatLng();
    const towardLat = v.toCoord[0] - latLng.lat;
    const towardLng = v.toCoord[1] - latLng.lng;
    const nudge = v.status === 'active' ? .035 : .012;
    entry.marker.setLatLng([latLng.lat + towardLat * nudge + (Math.random()-.5)*.004, latLng.lng + towardLng * nudge + (Math.random()-.5)*.004]);
  });
}

function exportMapManifest(){
  const feed = buildCebuVesselFeed();
  if(!feed.length){ toast('No vessel rows to export'); return; }
  const rows = [['Vessel','Route','Departure','Arrival/ETA','Status','Progress','Remarks']];
  feed.forEach(v=>rows.push([v.vessel, v.title, v.dep, v.arr || v.etaText, statusLabel(v.status), `${Math.round(v.progress)}%`, v.remarks]));
  const csv = rows.map(r=>r.map(cell=>`"${String(cell ?? '').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `cebu_live_map_manifest_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('Map manifest exported');
}

  if(mapLiveTimer){ clearInterval(mapLiveTimer); mapLiveTimer = null; }
  map = L.map('liveMap',{zoomControl:true,attributionControl:true,preferCanvas:true}).setView([10.2929,123.9053],8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap'}).addTo(map);
  vesselRoutesLayer = L.layerGroup().addTo(map);
  vesselMarkers = [];
  const bounds = [];
  const portSeen = new Set();
  feed.forEach(v=>{
    [v.from,v.to].forEach(port=>{
      if(portSeen.has(port)) return;
      const coord = PORT_COORDS[port];
      if(!coord) return;
      portSeen.add(port);
      L.marker(coord,{icon:makePortIcon()}).addTo(vesselRoutesLayer).bindPopup(`<div class="v107-popup"><b>${escapeHtml(PORT_LABELS[port] || port)}</b><br>Port Node</div>`);
      bounds.push(coord);
    });
    L.polyline([v.fromCoord,v.toCoord],{color:v.color,weight:v.status==='active'?5:3,opacity:v.status==='later'?.38:.76,dashArray:v.status==='active'?null:'10,10'}).addTo(vesselRoutesLayer);
    const marker = L.marker([v.lat,v.lng],{icon:makeVesselIcon(v)}).addTo(vesselRoutesLayer);
    marker.bindPopup(`<div class="v107-popup"><b>${escapeHtml(v.vessel)}</b><br>${escapeHtml(v.title)}<br>Departure: ${escapeHtml(v.dep)}<br>Arrival/ETA: ${escapeHtml(v.arr || v.etaText)}<br><span class="tag">${statusLabel(v.status)}</span></div>`);
    marker.bindTooltip(`${escapeHtml(v.vessel)} • ${statusLabel(v.status)}`,{direction:'top'});
    marker.on('click',()=>selectVessel(v.key,false));
    vesselMarkers.push({marker,data:v});
    bounds.push([v.lat,v.lng],v.fromCoord,v.toCoord);
  });
  if(bounds.length){ map.fitBounds(bounds,{padding:[30,30]}); }
  setTimeout(()=>{ try{ map.invalidateSize(); }catch(e){} },250);
  mapLiveTimer = setInterval(updateLiveMapPositions,9000);
}

function refreshLiveMap(showToast = true){
  const feed = buildCebuVesselFeed();
  mapV107LastFeed = feed;
  const list = $('vesselStatusList');
  if(list) list.innerHTML = feed.length ? feed.slice(0,14).map(v=>renderVesselRow(v)).join('') : '<div class="v107-row">No Cebu vessel schedule available for the selected filters.</div>';
  const details = $('v104VesselDetails');
  if(details && mapFocusedVesselKey){
    const selected = feed.find(v=>v.key===mapFocusedVesselKey);
    details.innerHTML = selected ? renderVesselDetails(selected) : 'Selected vessel is hidden by current filters.';
  }
  initMap();
  if(showToast) toast('Cebu Command Map Pro refreshed');
}

function renderVesselDetails(v){
  const nextAction = v.status === 'boarding' ? 'Prepare boarding lane and cashier verification.' : v.status === 'soon' ? 'Monitor gate readiness and passenger queue.' : v.status === 'active' ? 'Track arrival window and receiving port status.' : 'Scheduled. Keep route manifest ready.';
  return `<strong style="color:var(--accent)">${escapeHtml(v.vessel)}</strong><br>
    ${escapeHtml(v.title)}<br>
    Status: <b>${statusLabel(v.status)}</b> • ${statusEta(v)}<br>
    Route: ${escapeHtml(PORT_LABELS[v.from] || v.from)} → ${escapeHtml(PORT_LABELS[v.to] || v.to)} • Travel window ${v.travelMinutes} min • Progress ${Math.round(v.progress)}%<br>
    Action: ${escapeHtml(nextAction)}<br>
    ${v.remarks ? 'Note: '+escapeHtml(v.remarks) : 'No route note.'}`;
}

function centerMapCebu(){
  if(map){ map.setView([10.2929,123.9053],9,{animate:true}); toast('Centered on Cebu Pier'); }
}

function toggleMapAutoCycle(){
  mapV107AutoCycle = !mapV107AutoCycle;
  const btn = $('mapAutoCycleBtn');
  if(btn) btn.textContent = mapV107AutoCycle ? '⏸ Stop Auto' : '▶ Auto Cycle';
  if(mapV107AutoTimer){ clearInterval(mapV107AutoTimer); mapV107AutoTimer = null; }
  if(mapV107AutoCycle){
    let i = 0;
    mapV107AutoTimer = setInterval(()=>{
      if(!vesselMarkers.length) return;
      const entry = vesselMarkers[i % vesselMarkers.length];
      selectVessel(entry.data.key,true);
      i++;
    },4500);
    toast('Auto cycle started');
  } else {
    toast('Auto cycle stopped');
  }
}

function updateLiveMapPositions(){
  if(!vesselMarkers.length) return;
  vesselMarkers.forEach(entry=>{
    const v = entry.data;
    const latLng = entry.marker.getLatLng();
    const nudge = v.status === 'active' ? .045 : v.status === 'soon' ? .02 : .01;
    const lat = latLng.lat + (v.toCoord[0] - latLng.lat) * nudge + (Math.random()-.5)*.003;
    const lng = latLng.lng + (v.toCoord[1] - latLng.lng) * nudge + (Math.random()-.5)*.003;
    entry.marker.setLatLng([lat,lng]);
  });
}

function exportMapManifest(){
  const feed = buildCebuVesselFeed();
  if(!feed.length){ toast('No vessel rows to export'); return; }
  const rows = [['Vessel','Route','Departure','Arrival/ETA','Status','Progress','From','To','Remarks']];
  feed.forEach(v=>rows.push([v.vessel,v.title,v.dep,v.arr || v.etaText,statusLabel(v.status),`${Math.round(v.progress)}%`,PORT_LABELS[v.from] || v.from,PORT_LABELS[v.to] || v.to,v.remarks]));
  const csv = rows.map(r=>r.map(cell=>`"${String(cell ?? '').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `cebu_command_map_v107_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('Cebu map manifest exported');
}

<script>
/* V108 Cebu Command Map Elite
   Scope: overrides Live Map functions only.
   All baggage, fares, schedules, Gemini, PDF receipt, and connecting fare logic are preserved. */
(function(){
  'use strict';
  var v108 = window.OJ_V108_MAP = window.OJ_V108_MAP || {
    selectedRoute: 'all',
    selectedStatus: 'all',
    search: '',
    autoFocus: false,
    autoFocusIndex: 0,
    autoFocusTimer: null,
    mapTickTimer: null,
    feed: [],
    markers: []
  };

  function el(id){ return document.getElementById(id); }
  function notify(msg){ if(typeof toast === 'function') toast(msg); else console.log(msg); }
  function phNow(){ return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Manila'})); }
  function esc(v){ return String(v == null ? '' : v).replace(/[&<>"']/g, function(ch){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]); }); }
  function routeName(key){
    if(typeof DB !== 'undefined' && DB.schedules && DB.schedules[key] && DB.schedules[key].title) return DB.schedules[key].title;
    return String(key || '').replace(/_/g,' → ').replace(/\b\w/g, function(m){return m.toUpperCase();});
  }
  function routeKeys(){
    if(typeof DB === 'undefined' || !DB.schedules) return [];
    var preferred = ['cebu_tagbilaran','cebu_getafe','cebu_ormoc','cebu_palompon','cebu_maasin','cebu_dumaguete','cebu_surigao','cebu_siquijor','tagbilaran_cebu','getafe_cebu','ormoc_cebu','palompon_cebu','maasin_cebu'];
    var keys = Object.keys(DB.schedules).filter(function(k){
      var title = routeName(k).toLowerCase();
      return k.indexOf('cebu') >= 0 || title.indexOf('cebu') >= 0;
    });
    return preferred.filter(function(k){return keys.indexOf(k)>=0;}).concat(keys.filter(function(k){return preferred.indexOf(k)<0;}));
  }
  function destinationLabel(key){
    var parts = String(key||'').split('_');
    if(parts[0] === 'cebu' && parts[1]) return parts[1].toUpperCase();
    if(parts[1] === 'cebu' && parts[0]) return parts[0].toUpperCase() + ' → CEBU';
    return routeName(key).toUpperCase();
  }
  function getPortCoords(){
    var fallback = {
      cebu:[10.2929,123.9053], tagbilaran:[9.6496,123.8547], getafe:[10.1547,124.1590], ormoc:[11.0064,124.6075],
      palompon:[11.0500,124.3833], maasin:[10.1336,124.8447], dumaguete:[9.3077,123.3054], surigao:[9.7833,125.4889], siquijor:[9.2142,123.5150]
    };
    try{ if(typeof PORT_COORDS !== 'undefined') return Object.assign({}, fallback, PORT_COORDS); }catch(e){}
    return fallback;
  }
  function getPortLabels(){
    var fallback = {cebu:'Cebu Pier 1',tagbilaran:'Tagbilaran',getafe:'Getafe',ormoc:'Ormoc',palompon:'Palompon',maasin:'Maasin',dumaguete:'Dumaguete',surigao:'Surigao',siquijor:'Siquijor'};
    try{ if(typeof PORT_LABELS !== 'undefined') return Object.assign({}, fallback, PORT_LABELS); }catch(e){}
    return fallback;
  }
  function colorFor(routeKey, dest){
    var colors = {tagbilaran:'#22c55e',getafe:'#38bdf8',ormoc:'#f59e0b',palompon:'#a855f7',maasin:'#ef4444',dumaguete:'#14b8a6',surigao:'#f97316',siquijor:'#ec4899',cebu:'#60a5fa'};
    return colors[dest] || colors[String(routeKey||'').split('_')[1]] || '#94a3b8';
  }
  function parseTimeMinutes(text){
    var raw = String(text || '').trim().toUpperCase().replace(/\s+/g,'');
    var m = raw.match(/^(\d{1,2})(?::(\d{2}))?(AM|PM)$/);
    if(!m) return null;
    var h = parseInt(m[1],10), min = parseInt(m[2] || '0',10);
    if(h === 12) h = 0;
    if(m[3] === 'PM') h += 12;
    return h*60 + min;
  }
  function routePorts(routeKey, title){
    var coords = getPortCoords();
    var parts = String(routeKey||'').toLowerCase().split('_');
    var from = parts[0] || 'cebu';
    var to = parts[1] || 'tagbilaran';
    if(!coords[from] || !coords[to]){
      var lower = String(title||'').toLowerCase();
      var ports = Object.keys(coords).filter(function(port){ return lower.indexOf(port) >= 0; });
      if(ports.length >= 2){ from = ports[0]; to = ports[1]; }
    }
    if(!coords[from]) from = 'cebu';
    if(!coords[to]) to = from === 'cebu' ? 'tagbilaran' : 'cebu';
    return {from:from,to:to,fromCoord:coords[from],toCoord:coords[to]};
  }
  function buildEliteFeed(){
    var keys = routeKeys();
    var now = phNow();
    var nowMin = now.getHours()*60 + now.getMinutes();
    var rows = [];
    keys.forEach(function(key){
      var sched = DB.schedules[key];
      if(!sched || !Array.isArray(sched.trips)) return;
      var ports = routePorts(key, sched.title);
      var travelMinutes = Math.max(35, parseInt(String(sched.travel||'').match(/\d+/)?.[0] || '120',10) * (String(sched.travel||'').indexOf('m')>=0 && String(sched.travel||'').indexOf('h')<0 ? 1 : 60));
      sched.trips.forEach(function(trip, i){
        var depMin = parseTimeMinutes(trip.dep);
        var arrMin = parseTimeMinutes(trip.arr);
        if(depMin == null) depMin = 360 + i*120;
        var duration = arrMin != null ? arrMin - depMin : travelMinutes;
        if(duration <= 0) duration += 1440;
        var delta = nowMin - depMin;
        var status = 'scheduled';
        var statusText = 'Scheduled';
        var progress = 0;
        if(delta >= -20 && delta < 0){ status = 'soon'; statusText = 'Departing Soon'; progress = 4; }
        else if(delta >= 0 && delta <= 15){ status = 'boarding'; statusText = 'Boarding'; progress = Math.min(18, Math.max(6, delta)); }
        else if(delta > 15 && delta < duration){ status = 'active'; statusText = 'En Route'; progress = Math.min(92, Math.max(18, (delta/duration)*100)); }
        else if(delta >= duration){ status = 'completed'; statusText = 'Completed'; progress = 100; }
        else { progress = 0; }
        var filteredDelta = delta < -240 ? delta + 1440 : delta;
        var toKey = ports.to;
        var routeColor = colorFor(key, toKey);
        var lat = ports.fromCoord[0] + (ports.toCoord[0]-ports.fromCoord[0])*(progress/100);
        var lng = ports.fromCoord[1] + (ports.toCoord[1]-ports.fromCoord[1])*(progress/100);
        rows.push({
          key:key+'_'+i+'_'+String(trip.dep).replace(/[^a-z0-9]/gi,''), routeKey:key, title:sched.title || routeName(key),
          vessel:trip.vessel || 'OJ Vessel', dep:trip.dep || '', arr:trip.arr || '', remarks:trip.remarks || '',
          from:ports.from, to:ports.to, fromCoord:ports.fromCoord, toCoord:ports.toCoord, lat:lat, lng:lng, color:routeColor,
          status:status, statusText:statusText, progress:progress, delta:filteredDelta, travelMinutes:duration,
          eta: arrMin != null ? trip.arr : Math.max(0, Math.round(duration - Math.max(0,delta))) + ' min',
          sea: Math.abs(Math.sin((depMin+i*7)/111)) > .72 ? 'Moderate' : 'Calm',
          load: Math.min(98, Math.max(18, Math.round((sched.trips.length*7 + i*11 + (progress/2)) % 100))),
          berth: 'C' + ((i % 5)+1)
        });
      });
    });
    rows.sort(function(a,b){
      function rank(v){ return v.status==='boarding'?0:v.status==='soon'?1:v.status==='active'?2:v.status==='scheduled'?3:4; }
      var r = rank(a)-rank(b); if(r) return r;
      return Math.abs(a.delta) - Math.abs(b.delta);
    });
    var search = String(v108.search || '').toLowerCase();
    return rows.filter(function(v){
      var routeOk = v108.selectedRoute === 'all' || v.routeKey === v108.selectedRoute;
      var statusOk = v108.selectedStatus === 'all' || v.status === v108.selectedStatus;
      var searchOk = !search || [v.vessel,v.title,v.dep,v.arr,v.statusText,v.remarks].join(' ').toLowerCase().indexOf(search)>=0;
      return routeOk && statusOk && searchOk;
    });
  }

  window.applyScheduledOceanJetFares = function(){
    if(!window.DB || !DB.paxFares) return;

      DB.paxFares[route] = Object.assign({}, DB.paxFares[route] || {}, fare);
    });
    if (typeof applyConnectingPassengerFares === 'function') applyConnectingPassengerFares();
    try{ localStorage.setItem('off_baggage_v14', JSON.stringify(DB)); }catch(e){}
  };
  document.addEventListener('DOMContentLoaded', function(){
    setTimeout(function(){
      try{
        window.applyScheduledOceanJetFares && window.applyScheduledOceanJetFares();
        const dash = document.getElementById('view-dashboard');

          dash.insertBefore(card, dash.firstChild);
        }
      }catch(e){console.warn('Fare advisory patch skipped', e)}

})();

<script id="ojV114CommandDeckScript">
(function(){
  'use strict';
  if(window.__OJ_V114_COMMAND_DECK__) return;
  window.__OJ_V114_COMMAND_DECK__ = true;

  var ACTIVE_TAB = 'bridge';
  var VIEW_ID = 'view-command_deck';

  function el(id){ return document.getElementById(id); }
  function appDB(){ try{ return (typeof DB !== 'undefined' && DB) ? DB : null; }catch(e){ return null; } }
  function notify(msg){ if(typeof window.toast === 'function') window.toast(msg); else console.log(msg); }
  function routeTitle(key){
    var db = appDB();
    return (db && db.schedules && db.schedules[key] && db.schedules[key].title) ? db.schedules[key].title : key.replace(/_/g,' → ');
  }
  function parseMinutes(raw){
    if(!raw) return 99999;
    var s = String(raw).trim().toUpperCase().replace(/\s+/g,'');
    var m = s.match(/^(\d{1,2}):(\d{2})(AM|PM)$/);
    if(!m) return 99999;
    var h = parseInt(m[1],10), min = parseInt(m[2],10), ap = m[3];
    if(ap === 'PM' && h !== 12) h += 12;
    if(ap === 'AM' && h === 12) h = 0;
    return h * 60 + min;
  }
  function nowPHMinutes(){
    var d = new Date();
    try{
      var parts = new Intl.DateTimeFormat('en-PH',{timeZone:'Asia/Manila',hour:'2-digit',minute:'2-digit',hour12:false}).formatToParts(d);
      var hh = +(parts.find(function(p){return p.type==='hour';}) || {value:d.getHours()}).value;
      var mm = +(parts.find(function(p){return p.type==='minute';}) || {value:d.getMinutes()}).value;
      return hh * 60 + mm;
    }catch(e){ return d.getHours() * 60 + d.getMinutes(); }
  }
  function cebuTrips(){
    var db = appDB();
    var out = [];
    if(!db || !db.schedules) return out;
    Object.keys(db.schedules).forEach(function(key){
      if(key.indexOf('cebu_') !== 0 && key.indexOf('_cebu') < 0) return;
      var sched = db.schedules[key] || {};
      (sched.trips || []).forEach(function(t, idx){
        var mins = parseMinutes(t.dep);
        out.push({key:key, title:sched.title || routeTitle(key), travel:sched.travel || '', dep:t.dep || '', arr:t.arr || '', vessel:t.vessel || 'TBA', remarks:t.remarks || '', mins:mins, idx:idx});
      });
    });
    return out.sort(function(a,b){ return a.mins - b.mins; });
  }
  function nextTrips(limit){
    var now = nowPHMinutes();
    var trips = cebuTrips().map(function(t){
      var delta = t.mins - now;
      if(delta < 0) delta += 1440;
      return Object.assign({}, t, {etaMin:delta});
    }).sort(function(a,b){ return a.etaMin - b.etaMin; });
    return trips.slice(0, limit || 8);
  }
  function vesselSummary(){
    var map = {};
    cebuTrips().forEach(function(t){
      var id = t.vessel || 'TBA';
      if(!map[id]) map[id] = {vessel:id, count:0, routes:{}, first:t};
      map[id].count++;
      map[id].routes[t.title] = true;
      if(t.mins < map[id].first.mins) map[id].first = t;
    });
    return Object.keys(map).map(function(k){ return map[k]; }).sort(function(a,b){ return b.count - a.count; });
  }
  function statusFor(delta){
    if(delta <= 15) return 'Boarding';
    if(delta <= 45) return 'Standby';
    if(delta <= 120) return 'Upcoming';
    return 'Scheduled';
  }
  function money(n){ try{ return '₱' + Number(n||0).toLocaleString('en-PH'); }catch(e){ return '₱' + n; } }
  function fareLine(key){
    var db = appDB();
    if(!db || !db.paxFares || !db.paxFares[key]) return 'Fare unavailable';
    var f = db.paxFares[key];
    return 'Tourist ' + money(f['TC/OA']) + ' • Business ' + money(f.BC);
  }
  function ensureView(){
    var view = el(VIEW_ID);
    if(!view){
      view = document.createElement('div');
      view.id = VIEW_ID;
      view.className = 'view';
      var app = document.querySelector('.app') || document.body;
      app.appendChild(view);
    }
    return view;
  }
  function addDrawerItem(){
    var menu = el('drawerMenu');
    if(!menu || menu.querySelector('[data-view="command_deck"]')) return;
    var item = document.createElement('div');
    item.className = 'drawer-item';
    item.setAttribute('data-view','command_deck');
    item.onclick = function(){ if(typeof window.navigate === 'function') window.navigate('command_deck'); else showCommandDeck(); };
    item.innerHTML = '<i>🧭</i> Command Deck';
    var before = menu.querySelector('[data-view="map"]');
    if(before) menu.insertBefore(item, before);
    else menu.appendChild(item);
  }
  function patchDrawer(){
    if(typeof window.buildDrawerMenu === 'function' && !window.buildDrawerMenu.__v114CommandDeck){
      var original = window.buildDrawerMenu;
      window.buildDrawerMenu = function(){
        var result = original.apply(this, arguments);
        addDrawerItem();
        return result;
      };
      window.buildDrawerMenu.__v114CommandDeck = true;
    }
    addDrawerItem();
  }
  function patchShowView(){
    if(typeof window.showView === 'function' && !window.showView.__v114CommandDeck){
      var originalShow = window.showView;
      window.showView = function(name){
        ensureView();
        var result = originalShow.apply(this, arguments);
        if(name === 'command_deck') renderCommandDeck();
        addDrawerItem();
        return result;
      };
      window.showView.__v114CommandDeck = true;
    }
  }

  function tabButton(id, label){
    return '<button class="oj114-tab ' + (ACTIVE_TAB === id ? 'active' : '') + '" onclick="window.OJCommandDeck.openTab(\'' + id + '\')">' + label + '</button>';
  }
  function panelClass(id){ return 'oj114-panel ' + (ACTIVE_TAB === id ? 'active' : ''); }

  function hero(){
    var trips = cebuTrips();
    var next = nextTrips(1)[0];
    var vesselCount = vesselSummary().length;
    var routeCount = Array.from(new Set(trips.map(function(t){return t.key;}))).length;
    return '<div class="oj114-hero">' +
      '<div class="oj114-kicker">OceanJet Cebu Operations</div>' +
      '<div class="oj114-title">Command Deck</div>' +
      '<div class="oj114-sub">An immersive staff cockpit for Cebu trips, vessels, routes, ports, and passenger flow. It uses your saved schedule/fare data, not a separate system.</div>' +
      '<div class="oj114-status-grid">' +
        '<div class="oj114-status"><b>' + routeCount + '</b><span>Cebu Routes</span></div>' +
        '<div class="oj114-status"><b>' + trips.length + '</b><span>Trip Rows</span></div>' +
        '<div class="oj114-status"><b>' + vesselCount + '</b><span>Vessels</span></div>' +
        '<div class="oj114-status"><b>' + (next ? next.dep : '--') + '</b><span>Next Depart</span></div>' +
        '<div class="oj114-status"><b>' + (next ? next.vessel : '--') + '</b><span>Next Vessel</span></div>' +
        '<div class="oj114-status"><b>' + (next ? next.etaMin + 'm' : '--') + '</b><span>Countdown</span></div>' +
      '</div>' +
    '</div>';
  }
  function tabs(){
    return '<div class="oj114-tabs">' +
      tabButton('bridge','Bridge') +
      tabButton('voyages','Voyages') +
      tabButton('vessels','Vessels') +
      tabButton('port','Port Ops') +
      tabButton('manual','Manual') +
    '</div>';
  }
  function renderBridge(){
    var next = nextTrips(5);
    var top = next[0];
    var dots = next.slice(0,6).map(function(t,i){

    return '<div id="oj114-panel-bridge" class="' + panelClass('bridge') + '">' +
      '<div class="card glow"><div class="card-header">🛳 Bridge View</div>' +
        '<div class="oj114-bridge">' +
          '<div class="oj114-radar"><div class="oj114-radar-line"></div>' + dots + '</div>' +
          '<div class="oj114-mini-grid">' +
            '<div class="oj114-info"><small>Priority Vessel</small><b>' + (top ? top.vessel : 'No trip') + '</b></div>' +
            '<div class="oj114-info"><small>Route</small><b>' + (top ? top.title : '--') + '</b></div>' +
            '<div class="oj114-info"><small>Departure</small><b>' + (top ? top.dep + ' → ' + top.arr : '--') + '</b></div>' +
            '<div class="oj114-info"><small>Status</small><b>' + (top ? statusFor(top.etaMin) : '--') + '</b></div>' +
          '</div>' +
          '<div class="oj114-actions"><button class="primary sm" onclick="window.OJCommandDeck.openTab(\'voyages\')">Open Voyage Board</button><button class="sm" onclick="window.OJCommandDeck.refresh()">Refresh Deck</button><button class="accent sm" onclick="window.OJCommandDeck.exportCsv()">Export Manifest</button></div>' +
        '</div>' +
      '</div></div>';
  }
  function renderVoyages(){
    var trips = nextTrips(60);
    var options = ['all'].concat(Array.from(new Set(trips.map(function(t){return t.key;}))));
    return '<div id="oj114-panel-voyages" class="' + panelClass('voyages') + '">' +
      '<div class="card glow"><div class="card-header">🧾 Cebu Voyage Board</div>' +
      '<div class="oj114-search"><select id="oj114RouteFilter" onchange="window.OJCommandDeck.filterVoyages()">' + options.map(function(k){ return '<option value="' + k + '">' + (k === 'all' ? 'All Cebu Routes' : routeTitle(k)) + '</option>'; }).join('') + '</select><input id="oj114Search" placeholder="Search vessel, route, time" oninput="window.OJCommandDeck.filterVoyages()"></div>' +
      '<div id="oj114VoyageList"></div></div></div>';
  }
  function renderVoyageList(){
    var box = el('oj114VoyageList');

    var trips = nextTrips(80).filter(function(t){
      var hay = [t.title,t.vessel,t.dep,t.arr,t.remarks,statusFor(t.etaMin)].join(' ').toLowerCase();
      return (route === 'all' || t.key === route) && (!q || hay.indexOf(q) >= 0);
    }).slice(0,30);

      }).join('') : '<p class="oj114-note">No vessel data found.</p>') +
      '<div class="oj114-note" style="margin-top:10px">This panel groups vessels from the current schedule source. It can later connect to a live GPS/API feed.</div>' +
      '</div></div>';
  }
  function renderPort(){
    var next = nextTrips(8);
    var lanes = ['Gate A','Gate B','Gate C','Claims','Baggage'].map(function(name,idx){
      var t = next[idx] || next[0] || {};
      var load = Math.min(96, Math.max(18, (t.etaMin ? 100 - Math.min(t.etaMin,100) : 36) + idx*7));
      return '<div class="oj114-lane"><div class="oj114-lane-code">' + name + '</div><div><b>' + (t.vessel || 'Standby') + '</b><div class="oj114-trip-meta">' + (t.title || 'Cebu Port') + ' • ' + (t.dep || '--') + '</div><div class="oj114-bar"><i style="width:' + load + '%"></i></div></div></div>';
    }).join('');
    return '<div id="oj114-panel-port" class="' + panelClass('port') + '">' +
      '<div class="card glow"><div class="card-header">⚓ Port Ops Board</div>' + lanes +
      '<div class="oj114-note">Operational load is estimated from schedule timing and device records. For true live load, connect a backend API later.</div>' +
      '</div></div>';
  }
  function renderManual(){
    return '<div id="oj114-panel-manual" class="' + panelClass('manual') + '">' +
      '<div class="card glow"><div class="card-header">📘 Command Deck Uses</div>' +
      '<div class="oj114-note"><b>Bridge:</b> immersive cockpit view for the next Cebu vessel.<br><br><b>Voyages:</b> fast route/vessel search for staff.<br><br><b>Vessels:</b> vessel grouping and trip count from your schedule data.<br><br><b>Port Ops:</b> lane planning board for boarding, baggage, and claims.<br><br>This is intentionally lightweight so it does not bring back the laggy animation layer.</div>' +
      '<div class="oj114-actions"><button class="primary sm" onclick="window.OJCommandDeck.openTab(\'bridge\')">Return to Bridge</button><button class="accent sm" onclick="window.OJCommandDeck.exportCsv()">Export Manifest</button></div>' +
      '</div></div>';
  }
  function renderCommandDeck(){
    ensureView().innerHTML = '<div class="oj114-shell">' + hero() + tabs() + renderBridge() + renderVoyages() + renderVessels() + renderPort() + renderManual() + '</div>';
    renderVoyageList();
    document.querySelectorAll('.drawer-item').forEach(function(i){ i.classList.toggle('active', i.getAttribute('data-view') === 'command_deck'); });
  }
  function showCommandDeck(){
    ensureView();
    document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
    el(VIEW_ID).classList.add('active');
    renderCommandDeck();
  }
  function exportCsv(){
    var rows = [['Route','Departure','Arrival','Vessel','Status','Fare Summary','Remarks']].concat(nextTrips(100).map(function(t){
      return [t.title,t.dep,t.arr,t.vessel,statusFor(t.etaMin),fareLine(t.key),t.remarks];
    }));
    var csv = rows.map(function(row){ return row.map(function(cell){ return '"' + String(cell == null ? '' : cell).replace(/"/g,'""') + '"'; }).join(','); }).join('\n');
    var a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download = 'oceanjet_cebu_command_deck_manifest_v114.csv';
    a.click();
    notify('Command Deck manifest exported');
  }

  window.OJCommandDeck = {
    openTab:function(id){ ACTIVE_TAB = id; renderCommandDeck(); },
    filterVoyages:renderVoyageList,
    refresh:function(){ renderCommandDeck(); notify('Command Deck refreshed'); },
    exportCsv:exportCsv,
    show:showCommandDeck
  };

  function boot(){
    ensureView();
    patchDrawer();
    patchShowView();
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot, {once:true});
  else boot();
})();
</script>
